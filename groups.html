<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Groups — SSF Aquatics</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="sidebar.js" defer></script>
<style>
  /* Sidebar layout scroll fix */
  .ssf-main { overflow-y: auto !important; }
  body::before { z-index: -1; }
  .shimmer-bg { z-index: -1; }

  :root {
    --deep:#071429; --navy:#0B1F3A; --mid:#2196F3; --light:#64B5F6;
    --gold:#F9A825; --white:#F0F6FF; --grey:#8BA3C0;
    --border:rgba(33,150,243,0.12); --hover:rgba(33,150,243,0.06);
    --green:#43A047; --red:#E53935;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--deep);color:var(--white);font-family:'DM Sans',sans-serif;font-weight:300;}
  body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(180deg,transparent 0px,transparent 58px,rgba(33,150,243,0.04) 58px,rgba(33,150,243,0.04) 60px);pointer-events:none;z-index:0;}
  .shimmer-bg{position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(21,101,192,0.18) 0%,transparent 70%);pointer-events:none;z-index:0;}

  /* PAGE LAYOUT */
  .page-wrap{max-width:1100px;margin:0 auto;padding:2rem 1.75rem 4rem;position:relative;z-index:1;}
  .page-header{padding-bottom:1.5rem;border-bottom:1px solid var(--border);margin-bottom:2rem;display:flex;align-items:flex-end;justify-content:space-between;gap:1rem;flex-wrap:wrap;}
  .page-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(2rem,5vw,3rem);letter-spacing:.06em;line-height:1;}
  .page-title span{color:var(--light);}
  .page-sub{color:var(--grey);font-size:.85rem;margin-top:.3rem;}

  /* BUTTONS */
  .btn{display:inline-flex;align-items:center;gap:.4rem;font-family:'DM Mono',monospace;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;padding:.55rem 1.1rem;border-radius:6px;border:none;cursor:pointer;transition:all .15s;}
  .btn-primary{background:var(--mid);color:#fff;}
  .btn-primary:hover{background:#1976D2;}
  .btn-ghost{background:transparent;border:1px solid var(--border);color:var(--grey);}
  .btn-ghost:hover{border-color:var(--mid);color:var(--white);}
  .btn-danger{background:transparent;border:1px solid rgba(229,57,53,0.3);color:rgba(229,57,53,0.7);}
  .btn-danger:hover{border-color:var(--red);color:var(--red);}
  .btn-sm{padding:.3rem .7rem;font-size:.65rem;}

  /* GROUPS GRID */
  .groups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1.25rem;margin-bottom:2rem;}

  /* GROUP CARD */
  .group-card{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
  .group-card-header{padding:1rem 1.25rem;display:flex;align-items:center;gap:.75rem;border-bottom:1px solid var(--border);}
  .group-color-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;}
  .group-name{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:.04em;flex:1;}
  .group-count{font-family:'DM Mono',monospace;font-size:.7rem;color:var(--grey);}
  .group-card-body{padding:.75rem 1.25rem 1rem;}
  .group-swimmer-chips{display:flex;flex-wrap:wrap;gap:.3rem;max-height:80px;overflow:hidden;margin-bottom:.75rem;}
  .group-swimmer-chips.expanded{max-height:none;}
  .chip{font-size:.72rem;padding:.2rem .5rem;border-radius:4px;background:rgba(255,255,255,0.05);color:var(--grey);}
  .chip-more{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--light);cursor:pointer;}
  .chip-more:hover{text-decoration:underline;}
  .group-card-footer{display:flex;gap:.5rem;padding:0 1.25rem 1rem;}

  /* MODAL */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;display:flex;align-items:center;justify-content:center;padding:1rem;}
  .modal{background:#0D1E38;border:1px solid var(--border);border-radius:14px;width:100%;max-width:680px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;}
  .modal-header{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
  .modal-title{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:.05em;}
  .modal-close{background:none;border:none;color:var(--grey);font-size:1.2rem;cursor:pointer;padding:.25rem .5rem;border-radius:4px;transition:color .15s;}
  .modal-close:hover{color:var(--white);}
  .modal-body{padding:1.25rem 1.5rem;overflow-y:auto;flex:1;}
  .modal-footer{padding:1rem 1.5rem;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:.5rem;flex-shrink:0;}

  /* FORM */
  .form-row{margin-bottom:1.25rem;}
  .form-label{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;color:var(--grey);margin-bottom:.4rem;display:block;}
  .form-input{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(33,150,243,0.2);border-radius:8px;padding:.65rem 1rem;color:var(--white);font-family:inherit;font-size:.9rem;outline:none;transition:border-color .2s;}
  .form-input:focus{border-color:var(--mid);}

  /* COLOR PICKER */
  .color-options{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.4rem;}
  .color-opt{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .15s,transform .15s;}
  .color-opt:hover{transform:scale(1.15);}
  .color-opt.selected{border-color:#fff;}

  /* SWIMMER ASSIGNMENT */
  .assign-section{margin-top:1.25rem;}
  .assign-search{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(33,150,243,0.2);border-radius:8px;padding:.55rem 1rem;color:var(--white);font-family:inherit;font-size:.85rem;outline:none;margin-bottom:.75rem;}
  .assign-search:focus{border-color:var(--mid);}
  .assign-search::placeholder{color:var(--grey);}
  .assign-stats{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--grey);margin-bottom:.5rem;}
  .assign-stats span{color:var(--light);}
  .swimmer-list{max-height:320px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;}
  .swimmer-assign-row{display:flex;align-items:center;gap:.75rem;padding:.55rem .9rem;border-bottom:1px solid rgba(255,255,255,0.03);cursor:pointer;transition:background .1s;}
  .swimmer-assign-row:last-child{border-bottom:none;}
  .swimmer-assign-row:hover{background:var(--hover);}
  .swimmer-assign-row.selected{background:rgba(33,150,243,0.08);}
  .swimmer-checkbox{width:16px;height:16px;border-radius:4px;border:1px solid var(--border);background:transparent;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.7rem;transition:all .15s;}
  .swimmer-assign-row.selected .swimmer-checkbox{background:var(--mid);border-color:var(--mid);}
  .swimmer-assign-name{font-size:.85rem;flex:1;}
  .swimmer-assign-meta{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--grey);}
  .swimmer-group-tag{font-size:.62rem;padding:.12rem .4rem;border-radius:3px;font-family:'DM Mono',monospace;}

  /* EMPTY / LOADING */
  .empty-state{text-align:center;padding:3rem 2rem;color:var(--grey);}
  .spinner{width:32px;height:32px;border:2px solid rgba(33,150,243,0.2);border-top-color:var(--mid);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 1rem;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* UNASSIGNED SECTION */
  .unassigned-card{background:rgba(255,255,255,0.02);border:1px dashed rgba(33,150,243,0.2);border-radius:12px;padding:1.25rem;margin-top:1.25rem;}
  .unassigned-title{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;color:var(--grey);margin-bottom:.75rem;}
  .unassigned-chips{display:flex;flex-wrap:wrap;gap:.35rem;}
</style>
</head>
<body data-page="groups">
<div class="shimmer-bg"></div>

<div class="page-wrap">
  <div class="page-header">
    <div>
      <div class="page-title">Training <span>Groups</span></div>
      <div class="page-sub">Create groups, assign swimmers, filter across the whole platform</div>
    </div>
    <button class="btn btn-primary" id="new-group-btn">+ New Group</button>
  </div>

  <div id="groups-container">
    <div class="empty-state"><div class="spinner"></div><p>Loading…</p></div>
  </div>

  <div id="unassigned-section" style="display:none">
    <div class="unassigned-card">
      <div class="unassigned-title">Unassigned Swimmers (<span id="unassigned-count">0</span>)</div>
      <div class="unassigned-chips" id="unassigned-chips"></div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">New Group</div>
      <button class="modal-close" id="modal-close-btn">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <label class="form-label">Group Name</label>
        <input class="form-input" id="group-name-input" placeholder="e.g. Purple Group" maxlength="40">
      </div>
      <div class="form-row">
        <label class="form-label">Color</label>
        <div class="color-options" id="color-options"></div>
      </div>
      <div class="assign-section">
        <label class="form-label">Assign Swimmers</label>
        <input class="assign-search" id="assign-search" placeholder="Search by name…">
        <div class="assign-stats" id="assign-stats"></div>
        <div class="swimmer-list" id="swimmer-list"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="modal-cancel-btn">Cancel</button>
      <button class="btn btn-primary" id="modal-save-btn">Save Group</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp }  from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
import { getFirestore, collection, query, where, getDocs, doc, setDoc, deleteDoc, updateDoc, getDoc }
  from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA-hATur1TXeZePf4W4lqDTsxNRIg0NKfs",
  authDomain: "ssfaquatics.firebaseapp.com",
  projectId: "ssfaquatics",
  storageBucket: "ssfaquatics.firebasestorage.app",
  messagingSenderId: "21079628309",
  appId: "1:21079628309:web:8958a334f5cd5a69ae4c1c"
};
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

const COLORS = [
  "#7B1FA2","#1565C0","#2E7D32","#C62828","#E65100",
  "#00838F","#AD1457","#4527A0","#558B2F","#00695C",
  "#F9A825","#37474F","#6D4C41","#0277BD","#283593"
];

// ── STATE ──
let allSwimmers  = [];  // from Firestore swimmers collection
let allGroups    = [];  // from Firestore groups collection
let editingGroupId = null;
let selectedIds  = new Set();
let selectedColor = COLORS[0];
let searchQuery  = '';

// ── LOAD ──
async function load() {
  const [swSnap, grSnap] = await Promise.all([
    getDocs(query(collection(db, 'swimmers'), where('active', '==', true))),
    getDocs(collection(db, 'groups'))
  ]);
  allSwimmers = swSnap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => a.name.localeCompare(b.name));
  allGroups   = grSnap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => a.name.localeCompare(b.name));
  renderGroups();
}

// ── RENDER GROUPS ──
function renderGroups() {
  const container = document.getElementById('groups-container');

  if (!allGroups.length) {
    container.innerHTML = `<div class="empty-state">
      <p style="font-size:2rem;margin-bottom:.75rem">🏊</p>
      <p>No groups yet — create your first one.</p>
    </div>`;
    document.getElementById('unassigned-section').style.display = 'none';
    return;
  }

  // Build assigned set
  const assignedIds = new Set(allGroups.flatMap(g => g.swimmerIds || []));
  const unassigned  = allSwimmers.filter(s => !assignedIds.has(s.id));

  const cards = allGroups.map(g => {
    const swimmers = allSwimmers.filter(s => (g.swimmerIds||[]).includes(s.id));
    const SHOW = 12;
    const chips = swimmers.slice(0, SHOW).map(s => `<span class="chip">${s.name.split(' ')[0]} ${s.name.split(' ').slice(-1)[0]}</span>`).join('');
    const moreChip = swimmers.length > SHOW ? `<span class="chip-more" data-gid="${g.id}">+${swimmers.length - SHOW} more</span>` : '';

    return `<div class="group-card">
      <div class="group-card-header">
        <div class="group-color-dot" style="background:${g.color||'#1565C0'}"></div>
        <div class="group-name">${g.name}</div>
        <div class="group-count">${swimmers.length} swimmers</div>
      </div>
      <div class="group-card-body">
        <div class="group-swimmer-chips" id="chips-${g.id}">${chips}${moreChip}</div>
      </div>
      <div class="group-card-footer">
        <button class="btn btn-ghost btn-sm" data-edit="${g.id}">Edit</button>
        <button class="btn btn-danger btn-sm" data-delete="${g.id}" data-name="${g.name}">Delete</button>
      </div>
    </div>`;
  }).join('');

  container.innerHTML = `<div class="groups-grid">${cards}</div>`;

  // Wire edit/delete
  container.querySelectorAll('[data-edit]').forEach(btn => {
    btn.addEventListener('click', () => openModal(btn.dataset.edit));
  });
  container.querySelectorAll('[data-delete]').forEach(btn => {
    btn.addEventListener('click', () => confirmDelete(btn.dataset.delete, btn.dataset.name));
  });
  container.querySelectorAll('.chip-more').forEach(el => {
    el.addEventListener('click', () => {
      document.getElementById(`chips-${el.dataset.gid}`).classList.toggle('expanded');
      el.textContent = el.textContent.startsWith('+') ? 'Show less' : `+${allSwimmers.filter(s => (allGroups.find(g=>g.id===el.dataset.gid)?.swimmerIds||[]).includes(s.id)).length - 12} more`;
    });
  });

  // Unassigned
  if (unassigned.length) {
    document.getElementById('unassigned-section').style.display = 'block';
    document.getElementById('unassigned-count').textContent = unassigned.length;
    document.getElementById('unassigned-chips').innerHTML = unassigned
      .map(s => `<span class="chip">${s.name}</span>`).join('');
  } else {
    document.getElementById('unassigned-section').style.display = 'none';
  }
}

// ── MODAL ──
function openModal(groupId = null) {
  editingGroupId = groupId;
  selectedIds = new Set();
  selectedColor = COLORS[0];
  searchQuery = '';

  const group = groupId ? allGroups.find(g => g.id === groupId) : null;

  document.getElementById('modal-title').textContent = group ? `Edit: ${group.name}` : 'New Group';
  document.getElementById('group-name-input').value = group?.name || '';

  if (group) {
    selectedColor = group.color || COLORS[0];
    selectedIds = new Set(group.swimmerIds || []);
  }

  renderColorPicker();
  renderSwimmerList();
  document.getElementById('modal').style.display = 'flex';
  document.getElementById('group-name-input').focus();
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
  editingGroupId = null;
}

function renderColorPicker() {
  document.getElementById('color-options').innerHTML = COLORS.map(c =>
    `<div class="color-opt${c === selectedColor ? ' selected' : ''}"
      style="background:${c}" data-color="${c}"></div>`
  ).join('');
  document.querySelectorAll('.color-opt').forEach(el => {
    el.addEventListener('click', () => {
      selectedColor = el.dataset.color;
      document.querySelectorAll('.color-opt').forEach(x => x.classList.remove('selected'));
      el.classList.add('selected');
    });
  });
}

function renderSwimmerList() {
  const assignedElsewhere = new Map(); // swimcloudId -> group name
  allGroups.forEach(g => {
    if (g.id === editingGroupId) return;
    (g.swimmerIds || []).forEach(id => assignedElsewhere.set(id, g.name));
  });

  const filtered = allSwimmers.filter(s =>
    !searchQuery || s.name.toLowerCase().includes(searchQuery.toLowerCase())
  );

  const selected = filtered.filter(s => selectedIds.has(s.id));
  const unselected = filtered.filter(s => !selectedIds.has(s.id));
  const sorted = [...selected, ...unselected];

  document.getElementById('assign-stats').innerHTML =
    `<span>${selectedIds.size}</span> selected · ${allSwimmers.length} total swimmers`;

  document.getElementById('swimmer-list').innerHTML = sorted.map(s => {
    const inOther = assignedElsewhere.get(s.id);
    const isSel = selectedIds.has(s.id);
    return `<div class="swimmer-assign-row${isSel ? ' selected' : ''}" data-id="${s.id}">
      <div class="swimmer-checkbox">${isSel ? '✓' : ''}</div>
      <div class="swimmer-assign-name">${s.name}</div>
      <div class="swimmer-assign-meta">${s.gender || ''} · ${s.age ? `Age ${s.age}` : ''}</div>
      ${inOther ? `<span class="swimmer-group-tag" style="background:rgba(255,255,255,0.07);color:var(--grey)">${inOther}</span>` : ''}
    </div>`;
  }).join('') || `<div style="padding:1.5rem;text-align:center;color:var(--grey);font-size:.85rem">No swimmers found</div>`;

  document.querySelectorAll('.swimmer-assign-row').forEach(row => {
    row.addEventListener('click', () => {
      const id = row.dataset.id;
      if (selectedIds.has(id)) {
        selectedIds.delete(id);
        row.classList.remove('selected');
        row.querySelector('.swimmer-checkbox').textContent = '';
      } else {
        selectedIds.add(id);
        row.classList.add('selected');
        row.querySelector('.swimmer-checkbox').textContent = '✓';
      }
      document.getElementById('assign-stats').innerHTML =
        `<span>${selectedIds.size}</span> selected · ${allSwimmers.length} total swimmers`;
    });
  });
}

// ── SAVE ──
async function saveGroup() {
  const name = document.getElementById('group-name-input').value.trim();
  if (!name) {
    document.getElementById('group-name-input').focus();
    return;
  }

  const btn = document.getElementById('modal-save-btn');
  btn.textContent = 'Saving…';
  btn.disabled = true;

  try {
    const groupId = editingGroupId || `grp_${Date.now()}`;
    const data = {
      name,
      color: selectedColor,
      swimmerIds: [...selectedIds],
      updatedAt: new Date(),
    };
    if (!editingGroupId) data.createdAt = new Date();

    await setDoc(doc(db, 'groups', groupId), data, { merge: true });

    // Update swimmers' groupId field
    const batch = [];
    allSwimmers.forEach(s => {
      const inGroup = selectedIds.has(s.id);
      const wasInGroup = editingGroupId && (allGroups.find(g => g.id === editingGroupId)?.swimmerIds || []).includes(s.id);
      if (inGroup) {
        batch.push(updateDoc(doc(db, 'swimmers', s.id), { groupId, groupName: name, groupColor: selectedColor }));
      } else if (wasInGroup) {
        batch.push(updateDoc(doc(db, 'swimmers', s.id), { groupId: null, groupName: null, groupColor: null }));
      }
    });
    await Promise.all(batch);

    closeModal();
    await load();
  } catch(e) {
    console.error(e);
    alert('Save failed — check console');
  } finally {
    btn.textContent = 'Save Group';
    btn.disabled = false;
  }
}

// ── DELETE ──
async function confirmDelete(groupId, name) {
  if (!confirm(`Delete "${name}"? Swimmers will become unassigned.`)) return;
  try {
    // Clear groupId on swimmers
    const group = allGroups.find(g => g.id === groupId);
    if (group?.swimmerIds?.length) {
      await Promise.all(group.swimmerIds.map(sid =>
        updateDoc(doc(db, 'swimmers', sid), { groupId: null, groupName: null, groupColor: null })
      ));
    }
    await deleteDoc(doc(db, 'groups', groupId));
    await load();
  } catch(e) {
    console.error(e);
    alert('Delete failed');
  }
}

// ── EVENTS ──
document.getElementById('new-group-btn').addEventListener('click', () => openModal());
document.getElementById('modal-close-btn').addEventListener('click', closeModal);
document.getElementById('modal-cancel-btn').addEventListener('click', closeModal);
document.getElementById('modal-save-btn').addEventListener('click', saveGroup);
document.getElementById('modal').addEventListener('click', e => { if (e.target.id === 'modal') closeModal(); });
document.getElementById('assign-search').addEventListener('input', e => {
  searchQuery = e.target.value;
  renderSwimmerList();
});

// ── INIT ──
load().catch(e => {
  console.error(e);
  document.getElementById('groups-container').innerHTML =
    `<div class="empty-state"><p>Failed to load. Check console.</p></div>`;
});
</script>
</body>
</html>
