<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avatar Style Mockup — Purple Group</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:#0B1F3A; --deep:#071429; --mid:#2196F3; --light:#64B5F6;
    --white:#F0F6FF; --grey:#8BA3C0; --gold:#F9A825;
    --green2:#43A047; --red2:#EF5350;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{background:var(--deep);color:var(--white);font-family:'DM Sans',sans-serif;font-weight:300;padding:2rem;}
  body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(180deg,transparent 0px,transparent 58px,rgba(33,150,243,0.03) 58px,rgba(33,150,243,0.03) 60px);pointer-events:none;z-index:0;}

  h1{font-family:'Bebas Neue',sans-serif;font-size:2.5rem;letter-spacing:.04em;margin-bottom:.4rem;position:relative;z-index:1;}
  .subtitle{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.15em;color:var(--grey);text-transform:uppercase;margin-bottom:2rem;position:relative;z-index:1;}

  .note{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.1em;color:var(--gold);padding:.5rem .75rem;background:rgba(249,168,37,0.06);border:1px solid rgba(249,168,37,0.2);border-radius:2px;margin-bottom:2.5rem;position:relative;z-index:1;}

  .style-section{margin-bottom:3.5rem;position:relative;z-index:1;}
  .style-label{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:.06em;color:var(--light);margin-bottom:.25rem;}
  .style-slug{font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.15em;color:var(--grey);text-transform:uppercase;margin-bottom:1.25rem;}

  .avatar-grid{display:flex;gap:.75rem;flex-wrap:wrap;margin-bottom:1.5rem;}
  .avatar-chip{display:flex;flex-direction:column;align-items:center;gap:.4rem;}
  .avatar-img{width:56px;height:56px;border-radius:50%;border:2px solid rgba(33,150,243,0.2);background:var(--navy);overflow:hidden;display:flex;align-items:center;justify-content:center;}
  .avatar-img img{width:100%;height:100%;display:block;}
  .avatar-name{font-family:'DM Mono',monospace;font-size:.5rem;letter-spacing:.1em;color:var(--grey);text-transform:uppercase;max-width:60px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

  .preview-label{font-family:'DM Mono',monospace;font-size:.55rem;letter-spacing:.14em;color:var(--grey);text-transform:uppercase;margin-bottom:.6rem;}

  .leaderboard-preview{background:linear-gradient(135deg,rgba(33,150,243,0.06),rgba(33,150,243,0.01));border:1px solid rgba(33,150,243,0.15);border-radius:2px;padding:.5rem .75rem;max-width:520px;}
  .lb-row{display:flex;align-items:center;gap:.75rem;padding:.45rem .5rem;border-radius:2px;}
  .lb-rank{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--grey);width:20px;text-align:center;flex-shrink:0;}
  .lb-rank.gold{color:var(--gold);}
  .lb-rank.silver{color:#B0BEC5;}
  .lb-rank.bronze{color:#FF8A65;}
  .lb-avatar{width:34px;height:34px;border-radius:50%;border:1.5px solid rgba(33,150,243,0.2);background:var(--navy);overflow:hidden;flex-shrink:0;}
  .lb-avatar img{width:100%;height:100%;display:block;}
  .lb-info{flex:1;min-width:0;}
  .lb-name{font-size:.9rem;font-weight:500;line-height:1;}
  .lb-meta{font-family:'DM Mono',monospace;font-size:.55rem;letter-spacing:.1em;color:var(--grey);text-transform:uppercase;margin-top:.15rem;}
  .lb-time{font-family:'DM Mono',monospace;font-size:.85rem;color:var(--mid);font-weight:500;}
  .lb-tier{font-family:'DM Mono',monospace;font-size:.55rem;letter-spacing:.1em;padding:.15rem .4rem;border-radius:2px;background:rgba(0,229,255,0.1);color:#00E5FF;flex-shrink:0;}

  .hero-preview{background:linear-gradient(135deg,rgba(33,150,243,0.08),rgba(33,150,243,0.02));border:1px solid rgba(33,150,243,0.15);border-radius:2px;padding:1.5rem;max-width:360px;position:relative;overflow:hidden;margin-top:1.5rem;}
  .hero-preview::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(to bottom,var(--mid),rgba(33,150,243,0.1));}
  .hero-top{display:flex;align-items:center;gap:1rem;margin-bottom:1.25rem;}
  .hero-avatar{width:64px;height:64px;border-radius:50%;border:2px solid rgba(33,150,243,0.3);background:var(--navy);overflow:hidden;flex-shrink:0;}
  .hero-avatar img{width:100%;height:100%;display:block;}
  .hero-name{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:.04em;line-height:1;}
  .hero-sub{font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.14em;color:var(--grey);text-transform:uppercase;margin-top:.2rem;}
  .hero-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.75rem;}
  .hero-stat{text-align:center;}
  .hero-stat-val{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:.03em;color:var(--mid);}
  .hero-stat-lbl{font-family:'DM Mono',monospace;font-size:.5rem;letter-spacing:.12em;color:var(--grey);text-transform:uppercase;margin-top:.1rem;}

  hr{border:none;border-top:1px solid rgba(33,150,243,0.1);margin:3rem 0;}
</style>
</head>
<body>

<h1>Avatar Style Mockup</h1>
<div class="subtitle">Purple Group · SSF Swim Team · Pick a DiceBear style</div>
<div class="note">💡 Avatars load from api.dicebear.com — requires an internet connection.</div>

<div id="root"></div>

<script>
const SEEDS = [
  'Emma Chen', 'Liam Torres', 'Sofia Nguyen', 'Noah Kim',
  'Ava Patel', 'Mason Lee', 'Isabella Park', 'Ethan Zhao'
];

const STYLES = [
  { id: 'adventurer',         label: 'Adventurer',          desc: 'Illustrated friendly faces — great for kids' },
  { id: 'adventurer-neutral', label: 'Adventurer Neutral',  desc: 'Gender-neutral version of Adventurer' },
  { id: 'pixel-art',          label: 'Pixel Art',           desc: 'Retro pixel look — fun & sporty' },
  { id: 'lorelei',            label: 'Lorelei',             desc: 'Clean line-art, minimal & modern' },
  { id: 'micah',              label: 'Micah',               desc: 'Bold geometric faces, high contrast' },
  { id: 'bottts-neutral',     label: 'Bottts Neutral',      desc: 'Robot-style, gender-neutral, techy' },
  { id: 'fun-emoji',          label: 'Fun Emoji',           desc: 'Playful emoji-style faces' },
  { id: 'thumbs',             label: 'Thumbs',              desc: 'Cute round illustrated faces' },
];

const LB_DATA = [
  { name: 'Emma Chen',    meta: 'Age 14 · Free',  time: '55.42',   tier: 'AAAA', rank: 1 },
  { name: 'Sofia Nguyen', meta: 'Age 15 · Back',  time: '1:04.18', tier: 'AAA',  rank: 2 },
  { name: 'Ava Patel',    meta: 'Age 13 · Fly',   time: '1:07.33', tier: 'AA',   rank: 3 },
];

function url(style, seed, size) {
  return 'https://api.dicebear.com/9.x/' + style + '/svg?seed=' + encodeURIComponent(seed) + '&backgroundColor=0b1f3a&backgroundType=solid&size=' + (size||80);
}

function img(style, seed, size) {
  return '<img src="' + url(style, seed, size) + '" alt="' + seed + '" loading="lazy" onerror="this.parentElement.style.opacity=\'0.25\'">';
}

const root = document.getElementById('root');

STYLES.forEach(function(style, i) {
  let html = '<div class="style-section">';
  html += '<div class="style-label">' + style.label + '</div>';
  html += '<div class="style-slug">' + style.id + ' &nbsp;·&nbsp; ' + style.desc + '</div>';

  // Avatar grid
  html += '<div class="avatar-grid">';
  SEEDS.forEach(function(seed) {
    html += '<div class="avatar-chip">';
    html += '<div class="avatar-img">' + img(style.id, seed, 80) + '</div>';
    html += '<div class="avatar-name">' + seed.split(' ')[0] + '</div>';
    html += '</div>';
  });
  html += '</div>';

  // Leaderboard preview
  html += '<div class="preview-label">Leaderboard row preview</div>';
  html += '<div class="leaderboard-preview">';
  LB_DATA.forEach(function(row) {
    var rc = row.rank === 1 ? 'gold' : row.rank === 2 ? 'silver' : 'bronze';
    html += '<div class="lb-row">';
    html += '<div class="lb-rank ' + rc + '">' + row.rank + '</div>';
    html += '<div class="lb-avatar">' + img(style.id, row.name, 40) + '</div>';
    html += '<div class="lb-info"><div class="lb-name">' + row.name + '</div><div class="lb-meta">' + row.meta + '</div></div>';
    html += '<div class="lb-time">' + row.time + '</div>';
    html += '<div class="lb-tier">' + row.tier + '</div>';
    html += '</div>';
  });
  html += '</div>';

  // Hero card preview
  html += '<div class="preview-label" style="margin-top:1.5rem">Dashboard hero card preview</div>';
  html += '<div class="hero-preview">';
  html += '<div class="hero-top">';
  html += '<div class="hero-avatar">' + img(style.id, 'Emma Chen', 80) + '</div>';
  html += '<div><div class="hero-name">Emma Chen</div><div class="hero-sub">Age 14 · Freestyle</div></div>';
  html += '</div>';
  html += '<div class="hero-stats">';
  html += '<div class="hero-stat"><div class="hero-stat-val" style="color:#00E5FF">AAAA</div><div class="hero-stat-lbl">Best Tier</div></div>';
  html += '<div class="hero-stat"><div class="hero-stat-val">12</div><div class="hero-stat-lbl">Events</div></div>';
  html += '<div class="hero-stat"><div class="hero-stat-val" style="color:#43A047">3</div><div class="hero-stat-lbl">Near Cuts</div></div>';
  html += '</div>';
  html += '</div>';

  html += '</div>'; // style-section

  root.innerHTML += html;

  if (i < STYLES.length - 1) {
    root.innerHTML += '<hr>';
  }
});
</script>

</body>
</html>
