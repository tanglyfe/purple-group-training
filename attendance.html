<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Attendance — Purple Group</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:#0B1F3A; --deep:#071429; --mid:#2196F3; --light:#64B5F6;
    --white:#F0F6FF; --grey:#8BA3C0; --gold:#F9A825;
    --green:#2E7D32; --green2:#43A047; --red:#C62828; --red2:#EF5350;
    --present-bg:rgba(46,125,50,0.18); --present-border:#43A047;
    --absent-bg:rgba(198,40,40,0.18);  --absent-border:#EF5350;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;-webkit-text-size-adjust:100%;}
  body{background:var(--deep);color:var(--white);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;padding-bottom:6rem;}
  body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(180deg,transparent 0px,transparent 58px,rgba(33,150,243,0.03) 58px,rgba(33,150,243,0.03) 60px);pointer-events:none;z-index:0;}

  /* TOPBAR */
  .topbar{position:sticky;top:0;z-index:100;background:rgba(7,20,41,0.97);backdrop-filter:blur(12px);border-bottom:1px solid rgba(33,150,243,0.15);padding:.75rem 1rem;}
  .topbar-inner{max-width:680px;margin:0 auto;display:flex;align-items:center;gap:.75rem;}
  .back-btn{display:flex;align-items:center;gap:.4rem;font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.14em;color:var(--grey);text-decoration:none;text-transform:uppercase;padding:.4rem .6rem;border:1px solid rgba(255,255,255,0.08);border-radius:2px;transition:color .2s,border-color .2s;flex-shrink:0;}
  .back-btn:hover{color:var(--light);border-color:rgba(33,150,243,0.3);}
  .back-btn svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;}
  .topbar-title{flex:1;min-width:0;}
  .topbar-title h1{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:.04em;line-height:1;}
  .topbar-date{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.12em;color:var(--grey);text-transform:uppercase;margin-top:.15rem;}
  .sync-status{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;flex-shrink:0;transition:color .3s;}
  .sync-status.syncing{color:var(--gold);}
  .sync-status.synced{color:var(--green2);}
  .sync-status.error{color:var(--red2);}
  .lock-btn{background:none;border:1px solid rgba(255,255,255,0.08);border-radius:2px;color:var(--grey);font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;padding:.3rem .6rem;cursor:pointer;transition:all .2s;flex-shrink:0;}
  .lock-btn:hover{border-color:rgba(198,40,40,.4);color:#EF9A9A;}

  /* DATE BAR */
  .date-bar{max-width:680px;margin:0 auto;padding:1rem 1rem 0;position:relative;z-index:1;}
  .date-row{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap;}
  .date-label{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.15em;color:var(--grey);text-transform:uppercase;flex-shrink:0;}
  .date-input{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:2px;color:var(--white);font-family:'DM Mono',monospace;font-size:.85rem;padding:.45rem .75rem;outline:none;cursor:pointer;transition:border-color .2s;-webkit-appearance:none;}
  .date-input:focus{border-color:var(--mid);}
  .day-quick-btns{display:flex;gap:.4rem;flex-wrap:wrap;}
  .day-btn{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.1em;padding:.35rem .6rem;border:1px solid rgba(255,255,255,0.08);border-radius:2px;background:transparent;color:var(--grey);cursor:pointer;text-transform:uppercase;transition:all .15s;white-space:nowrap;}
  .day-btn:hover{border-color:var(--mid);color:var(--light);}
  .day-btn.active{background:rgba(33,150,243,0.15);border-color:var(--mid);color:var(--light);}

  /* STATS */
  .stats-bar{max-width:900px;margin:.75rem auto 0;padding:0 1rem;display:flex;gap:1rem;position:relative;z-index:1;flex-wrap:wrap;}
  .stat-pill{display:flex;align-items:center;gap:.4rem;font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;}
  .stat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .stat-num{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;line-height:1;}

  /* MARK ALL */
  .mark-all-bar{max-width:900px;margin:.75rem auto 0;padding:0 1rem;display:flex;gap:.5rem;position:relative;z-index:1;}
  .mark-all-btn{flex:1;padding:.6rem;border-radius:2px;border:1px solid rgba(255,255,255,0.08);background:transparent;font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:all .15s;}
  .mark-all-btn.present{color:var(--green2);border-color:rgba(67,160,71,0.3);}
  .mark-all-btn.present:hover{background:rgba(46,125,50,0.15);border-color:var(--green2);}
  .mark-all-btn.absent{color:var(--red2);border-color:rgba(239,83,80,0.3);}
  .mark-all-btn.absent:hover{background:rgba(198,40,40,0.15);border-color:var(--red2);}
  .mark-all-btn.clear{color:var(--grey);border-color:rgba(255,255,255,0.08);flex:0 0 auto;padding:.6rem 1rem;}
  .mark-all-btn.clear:hover{border-color:rgba(255,255,255,0.2);color:var(--white);}

  /* ROSTER */
  .content{max-width:680px;margin:1rem auto 0;padding:0 1rem;position:relative;z-index:1;}
  .lane-header{display:flex;align-items:center;gap:.75rem;padding:.6rem .9rem;border-radius:2px 2px 0 0;margin-top:1.25rem;margin-bottom:1px;}
  .lane-header h2{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.06em;flex:1;}
  .lane-count{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;opacity:.7;}
  .swimmer-row{display:flex;align-items:center;gap:.75rem;padding:.65rem .9rem;background:rgba(255,255,255,0.02);border-bottom:1px solid rgba(255,255,255,0.04);transition:background .15s;position:relative;}
  .swimmer-row:last-child{border-bottom:none;border-radius:0 0 2px 2px;}
  .swimmer-row:hover{background:rgba(255,255,255,0.04);}
  .swimmer-row.is-present{background:var(--present-bg);border-left:3px solid var(--present-border);}
  .swimmer-row.is-absent{background:var(--absent-bg);border-left:3px solid var(--absent-border);}
  .swimmer-row.unset{border-left:3px solid transparent;}
  .swimmer-info{flex:1;min-width:0;}
  .swimmer-name{font-size:.92rem;font-weight:500;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .swimmer-meta{font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.1em;color:var(--grey);text-transform:uppercase;margin-top:.1rem;}
  .att-btns{display:flex;gap:.4rem;flex-shrink:0;}
  .att-btn{width:42px;height:42px;border-radius:2px;border:1px solid rgba(255,255,255,0.1);background:transparent;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
  .att-btn.present-btn{color:var(--green2);border-color:rgba(67,160,71,0.25);}
  .att-btn.absent-btn{color:var(--red2);border-color:rgba(239,83,80,0.25);}
  .att-btn.note-btn{color:var(--grey);border-color:rgba(255,255,255,0.08);font-size:.9rem;}
  .att-btn.present-btn.active{background:rgba(46,125,50,0.3);border-color:var(--green2);box-shadow:0 0 0 2px rgba(67,160,71,0.2);}
  .att-btn.absent-btn.active{background:rgba(198,40,40,0.3);border-color:var(--red2);box-shadow:0 0 0 2px rgba(239,83,80,0.2);}
  .att-btn.note-btn.has-note{color:var(--gold);border-color:rgba(249,168,37,0.4);}
  .note-panel{display:none;padding:.5rem .9rem .75rem;background:rgba(249,168,37,0.05);border-left:3px solid var(--gold);border-bottom:1px solid rgba(255,255,255,0.04);}
  .note-panel.open{display:block;}
  .note-input{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(249,168,37,0.2);border-radius:2px;color:var(--white);font-family:'DM Sans',sans-serif;font-size:.82rem;padding:.5rem .75rem;outline:none;resize:none;transition:border-color .2s;min-height:60px;}
  .note-input:focus{border-color:var(--gold);}
  .note-input::placeholder{color:rgba(139,163,192,0.5);}

  /* VIEW TABS */
  .view-tabs{max-width:900px;margin:2rem auto 0;padding:0 1rem;display:flex;gap:1px;position:relative;z-index:1;}
  .view-tab{flex:1;padding:.6rem;text-align:center;font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);color:var(--grey);transition:all .15s;}
  .view-tab:first-child{border-radius:2px 0 0 2px;}
  .view-tab:last-child{border-radius:0 2px 2px 0;}
  .view-tab.active{background:rgba(33,150,243,0.1);border-color:rgba(33,150,243,0.3);color:var(--light);}
  .view-panel{max-width:900px;margin:.75rem auto 0;padding:0 1rem;position:relative;z-index:1;display:none;}
  .view-panel.active{display:block;}

  /* HISTORY GRID */
  .history-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:1px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;}
  .history-card{background:var(--deep);padding:.9rem 1rem;cursor:pointer;transition:background .15s;}
  .history-card:hover{background:rgba(33,150,243,0.06);}
  .history-date{font-family:'DM Mono',monospace;font-size:.68rem;letter-spacing:.1em;color:var(--light);margin-bottom:.3rem;}
  .history-summary{font-size:.8rem;color:var(--grey);line-height:1.5;}
  .history-bar{display:flex;gap:2px;margin-top:.5rem;height:4px;border-radius:2px;overflow:hidden;}
  .history-bar-present{background:var(--green2);}
  .history-bar-absent{background:var(--red2);}
  .history-bar-unset{background:rgba(255,255,255,0.1);}

  /* WEEKLY SUMMARY */
  .week-summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;margin-bottom:1rem;}
  .week-stat-card{background:var(--deep);padding:1rem 1.25rem;}
  .week-stat-label{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.15em;color:var(--grey);text-transform:uppercase;margin-bottom:.3rem;}
  .week-stat-num{font-family:'Bebas Neue',sans-serif;font-size:2rem;line-height:1;}

  /* SWIMMER % TABLE */
  .swimmer-pct-table{border:1px solid rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;}
  .pct-row{display:grid;grid-template-columns:1fr 80px 60px;gap:.5rem;align-items:center;padding:.6rem .9rem;border-bottom:1px solid rgba(255,255,255,0.04);transition:background .15s;}
  .pct-row:last-child{border-bottom:none;}
  .pct-row:hover{background:rgba(255,255,255,0.02);}
  .pct-row.header{background:rgba(255,255,255,0.03);font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.12em;color:var(--grey);text-transform:uppercase;}
  .pct-name{font-size:.85rem;font-weight:500;}
  .pct-bar-wrap{height:4px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;}
  .pct-bar-fill{height:100%;background:var(--green2);border-radius:2px;transition:width .4s;}
  .pct-num{font-family:'DM Mono',monospace;font-size:.72rem;text-align:right;}

  /* EXPORT */
  .export-bar{max-width:680px;margin:1.5rem auto 0;padding:0 1rem;display:flex;gap:.5rem;}
  .export-btn{flex:1;padding:.75rem;border-radius:2px;border:1px solid rgba(255,255,255,0.08);background:transparent;color:var(--grey);font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:all .15s;}
  .export-btn:hover{border-color:var(--mid);color:var(--light);}

  /* EMPTY */
  .empty-state{padding:1.5rem;text-align:center;font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.12em;color:rgba(139,163,192,0.4);text-transform:uppercase;border:1px solid rgba(255,255,255,0.06);border-radius:2px;}

  /* LOADING */
  .loading-row{padding:.75rem .9rem;font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.12em;color:var(--gold);text-transform:uppercase;text-align:center;background:rgba(249,168,37,0.03);border:1px solid rgba(249,168,37,0.08);border-radius:2px;margin-top:.5rem;}

  /* MONTHLY VIEW */
  .month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
  .month-nav-btn{background:none;border:1px solid rgba(255,255,255,0.1);border-radius:2px;color:var(--grey);font-family:'DM Mono',monospace;font-size:.7rem;letter-spacing:.1em;padding:.4rem .8rem;cursor:pointer;transition:all .15s;}
  .month-nav-btn:hover{border-color:var(--mid);color:var(--light);}
  .month-nav-label{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:.05em;}

  .month-stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;margin-bottom:1.25rem;}
  .month-stat{background:var(--deep);padding:.9rem 1rem;}
  .month-stat-label{font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.14em;color:var(--grey);text-transform:uppercase;margin-bottom:.25rem;}
  .month-stat-num{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;line-height:1;}

  /* HEATMAP */
  .heatmap-wrap{border:1px solid rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;margin-bottom:1.25rem;}
  .heatmap-header{display:grid;grid-template-columns:repeat(7,1fr);background:rgba(255,255,255,0.03);border-bottom:1px solid rgba(255,255,255,0.06);}
  .heatmap-dow{font-family:'DM Mono',monospace;font-size:.55rem;letter-spacing:.1em;color:var(--grey);text-transform:uppercase;text-align:center;padding:.4rem 0;}
  .heatmap-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:.5rem;}
  .heatmap-cell{aspect-ratio:1;border-radius:2px;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:.55rem;color:rgba(255,255,255,0.5);cursor:default;transition:transform .1s;position:relative;}
  .heatmap-cell:hover{transform:scale(1.15);z-index:2;}
  .heatmap-cell.empty{background:transparent;cursor:default;}
  .heatmap-cell.no-session{background:rgba(255,255,255,0.04);}
  .heatmap-cell.pct-high{background:rgba(46,125,50,0.7);}
  .heatmap-cell.pct-mid{background:rgba(249,168,37,0.5);}
  .heatmap-cell.pct-low{background:rgba(198,40,40,0.55);}
  .heatmap-cell.today-cell{outline:2px solid var(--mid);outline-offset:-2px;}

  /* ABSENCE ALERTS */
  .alert-section{margin-bottom:1.25rem;}
  .alert-section-title{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.15em;color:var(--gold);text-transform:uppercase;margin-bottom:.5rem;display:flex;align-items:center;gap:.4rem;}
  .alert-card{background:rgba(198,40,40,0.08);border:1px solid rgba(198,40,40,0.2);border-left:3px solid var(--red2);border-radius:2px;padding:.7rem 1rem;margin-bottom:.4rem;display:flex;align-items:center;justify-content:space-between;}
  .alert-name{font-size:.88rem;font-weight:500;}
  .alert-detail{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.1em;color:var(--red2);text-transform:uppercase;}
  .no-alerts{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.12em;color:var(--green2);text-transform:uppercase;padding:.6rem 0;}

  /* MONTHLY SWIMMER TABLE */
  .month-swimmer-table{border:1px solid rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;margin-bottom:1.25rem;}
  .month-swimmer-row{display:grid;grid-template-columns:1fr 55px 55px 55px 70px;gap:.4rem;align-items:center;padding:.6rem .9rem;border-bottom:1px solid rgba(255,255,255,0.04);}
  .month-swimmer-row:last-child{border-bottom:none;}
  .month-swimmer-row:hover{background:rgba(255,255,255,0.02);}
  .month-swimmer-row.msw-header{background:rgba(255,255,255,0.03);font-family:'DM Mono',monospace;font-size:.55rem;letter-spacing:.12em;color:var(--grey);text-transform:uppercase;}
  .trend-up{color:var(--green2);}
  .trend-dn{color:var(--red2);}
  .trend-eq{color:var(--grey);}

  /* MOM CHART */
  .mom-chart{border:1px solid rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;margin-bottom:1.25rem;}
  .mom-chart-title{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.15em;color:var(--grey);text-transform:uppercase;padding:.75rem 1rem .5rem;}
  .mom-bars{display:flex;align-items:flex-end;gap:4px;height:80px;padding:0 1rem .75rem;}
  .mom-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:.3rem;}
  .mom-bar{width:100%;border-radius:2px 2px 0 0;transition:height .4s;min-height:2px;background:var(--mid);}
  .mom-bar-label{font-family:'DM Mono',monospace;font-size:.5rem;letter-spacing:.06em;color:var(--grey);text-align:center;}
  .mom-bar-pct{font-family:'DM Mono',monospace;font-size:.55rem;color:var(--light);text-align:center;}
</style>
  <script src="sidebar.js" defer></script>

<style>
  /* Sidebar layout scroll fix */
  .ssf-main { overflow-y: auto !important; }
  body::before { z-index: -1; }
  .shimmer-bg { z-index: -1; }
</style>

<body data-page="attendance">

<!-- MAIN APP -->
<div id="att-app">

<!-- DATE BAR -->
<div class="date-bar">
  <div class="date-row">
    <span class="date-label">Date</span>
    <input type="date" class="date-input" id="date-picker">
    <div class="day-quick-btns" id="week-btns"></div>
  </div>
</div>

<!-- STATS -->
<div class="stats-bar">
  <div class="stat-pill">
    <div class="stat-dot" style="background:var(--green2)"></div>
    <span class="stat-num" id="stat-present">0</span>
    <span style="color:var(--grey)">Present</span>
  </div>
  <div class="stat-pill">
    <div class="stat-dot" style="background:var(--red2)"></div>
    <span class="stat-num" id="stat-absent">0</span>
    <span style="color:var(--grey)">Absent</span>
  </div>
  <div class="stat-pill">
    <div class="stat-dot" style="background:rgba(255,255,255,0.15)"></div>
    <span class="stat-num" id="stat-unset">35</span>
    <span style="color:var(--grey)">Unmarked</span>
  </div>
</div>

<!-- MARK ALL -->
<div class="mark-all-bar">
  <button class="mark-all-btn present" id="mark-present-btn">✓ Mark All Present</button>
  <button class="mark-all-btn absent"  id="mark-absent-btn">✗ Mark All Absent</button>
  <button class="mark-all-btn clear"   id="mark-clear-btn">Clear</button>
</div>

<!-- ROSTER -->
<div class="content" id="roster-content"></div>

<!-- VIEW TABS -->
<div class="view-tabs">
  <div class="view-tab active" data-view="history">📅 History</div>
  <div class="view-tab" data-view="weekly">📊 Weekly</div>
  <div class="view-tab" data-view="swimmers">🏊 Swimmers</div>
  <div class="view-tab" data-view="monthly">📆 Monthly</div>
</div>

<!-- HISTORY PANEL -->
<div class="view-panel active" id="panel-history">
  <div id="history-container"></div>
</div>

<!-- WEEKLY SUMMARY PANEL -->
<div class="view-panel" id="panel-weekly">
  <div id="weekly-container"></div>
</div>

<!-- SWIMMER % PANEL -->
<div class="view-panel" id="panel-swimmers">
  <div id="swimmers-container"></div>
</div>

<!-- MONTHLY PANEL -->
<div class="view-panel" id="panel-monthly">
  <div id="monthly-container"></div>
</div>

<!-- EXPORT -->
<div class="export-bar">
  <button class="export-btn" id="export-csv-btn">⬇ Export CSV</button>
  <button class="export-btn" id="export-summary-btn">📋 Copy Today's Summary</button>
</div>

</div><!-- end #att-app -->

// ─────────────────────────────────────────────────────────────────────────────
// SYNC STATUS
// ─────────────────────────────────────────────────────────────────────────────
function setSyncStatus(state, msg) {
  const el = document.getElementById('sync-status');
  el.className = 'sync-status ' + state;
  el.textContent = msg;
}

// ─────────────────────────────────────────────────────────────────────────────
// FIRESTORE — READ ONE DATE
// ─────────────────────────────────────────────────────────────────────────────
async function firestoreReadDate(date) {
  try {
    setSyncStatus('syncing', '⟳ Loading…');
    const snap = await getDoc(doc(db, 'attendance', date));
    setSyncStatus('synced', '✓ Synced');
    return snap.exists() ? snap.data() : null;
  } catch(e) {
    setSyncStatus('error', '✗ Offline');
    console.error('Firestore read error:', e);
    return null;
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// FIRESTORE — READ ALL DATES (for history / stats panels)
// ─────────────────────────────────────────────────────────────────────────────
async function firestoreReadAll() {
  try {
    setSyncStatus('syncing', '⟳ Loading…');
    const snap = await getDocs(collection(db, 'attendance'));
    setSyncStatus('synced', '✓ Synced');
    const result = {};
    snap.forEach(d => { result[d.id] = d.data(); });
    return result;
  } catch(e) {
    setSyncStatus('error', '✗ Offline');
    console.error('Firestore read all error:', e);
    return null;
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// FIRESTORE — WRITE ONE SWIMMER RECORD
// ─────────────────────────────────────────────────────────────────────────────
async function firestoreWrite(date, name, status, note) {
  try {
    setSyncStatus('syncing', '⟳ Saving…');
    const ref = doc(db, 'attendance', date);
    await setDoc(ref, {
      [name]: { status: status || '', note: note || '' }
    }, { merge: true });
    setSyncStatus('synced', '✓ Saved');
    lsSave();
  } catch(e) {
    setSyncStatus('error', '✗ Offline');
    console.error('Firestore write error:', e);
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// FIRESTORE — WRITE FULL DAY (mark all)
// ─────────────────────────────────────────────────────────────────────────────
async function firestoreWriteDay(date, records) {
  try {
    setSyncStatus('syncing', '⟳ Saving…');
    await setDoc(doc(db, 'attendance', date), records);
    setSyncStatus('synced', '✓ Saved');
    lsSave();
  } catch(e) {
    setSyncStatus('error', '✗ Offline');
    console.error('Firestore write day error:', e);
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// LOCAL STORAGE CACHE (offline fallback)
// ─────────────────────────────────────────────────────────────────────────────
function lsLoad() {
  try { return JSON.parse(localStorage.getItem(LS_KEY)) || {}; }
  catch(e) { return {}; }
}

function lsSave() {
  try { localStorage.setItem(LS_KEY, JSON.stringify(attendance)); }
  catch(e) { /* storage full — ignore */ }
}

// ─────────────────────────────────────────────────────────────────────────────
// DATA HELPERS
// ─────────────────────────────────────────────────────────────────────────────
function ensureDate(d) {
  if (!attendance[d]) {
    attendance[d] = {};
    SWIMMERS.forEach(s => { attendance[d][s.name] = { status: null, note: '' }; });
  }
}

function getRecord(d, name) {
  ensureDate(d);
  if (!attendance[d][name]) attendance[d][name] = { status: null, note: '' };
  return attendance[d][name];
}

// ─────────────────────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────────────────────
async function initApp() {
  // 1. Load localStorage immediately for instant render
  attendance = lsLoad();
  currentDate = todayStr();

  document.getElementById('date-picker').value = currentDate;
  document.getElementById('date-picker').addEventListener('change', e => switchDate(e.target.value));

  buildWeekBtns();
  updateTopbarDate();
  ensureDate(currentDate);
  renderRoster();
  updateStats();

  // 2. Load today from Firestore and merge
  const todayData = await firestoreReadDate(currentDate);
  if (todayData) {
    attendance[currentDate] = {};
    SWIMMERS.forEach(sw => {
    attendance[currentDate][sw.name] = {
        status: todayData[sw.name]?.status || null,
        note: todayData[sw.name]?.note || ''
      };
    });
    lsSave();
    renderRoster();
    updateStats();
  }

  // 3. Load all dates in background for history/stats panels
  const allData = await firestoreReadAll();
  if (allData) {
    Object.keys(allData).forEach(date => {
      attendance[date] = attendance[date] || {};
      SWIMMERS.forEach(sw => {
        const raw = allData[date][sw.name];
        attendance[date][sw.name] = {
          status: raw?.status || null,
          note: raw?.note || ''
        };
      });
    });
    lsSave();
  }

  renderHistory();
  renderWeeklySummary();
  renderSwimmerPct();
  renderMonthly();
}

function buildWeekBtns() {
  const container = document.getElementById('week-btns');
  const days = ['Mon','Tue','Wed','Thu','Fri'];
  const today = new Date();
  const dow = today.getDay();
  const monday = new Date(today);
  monday.setDate(today.getDate() - (dow === 0 ? 6 : dow - 1));
  container.innerHTML = '';
  for (let i = 0; i < 5; i++) {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    const str = d.toISOString().split('T')[0];
    const btn = document.createElement('button');
    btn.className = 'day-btn' + (str === currentDate ? ' active' : '');
    btn.textContent = days[i];
    btn.dataset.date = str;
    btn.onclick = () => switchDate(str);
    container.appendChild(btn);
  }
}

async function switchDate(d) {
  currentDate = d;
  document.getElementById('date-picker').value = d;
  document.querySelectorAll('.day-btn').forEach(b => b.classList.toggle('active', b.dataset.date === d));
  updateTopbarDate();
  ensureDate(d);
  renderRoster();
  updateStats();

  // Load this date from Firestore if not already cached
  const firestoreData = await firestoreReadDate(d);
  if (firestoreData) {
    attendance[d] = {};
    SWIMMERS.forEach(sw => {
      attendance[d][sw.name] = firestoreData[sw.name] || { status: null, note: '' };
    });
    lsSave();
    renderRoster();
    updateStats();
  }
}

function updateTopbarDate() {

function setStatus(name, status) {
  ensureDate(currentDate);
  const rec = getRecord(currentDate, name);
  rec.status = rec.status === status ? null : status;
  lsSave();
  updateRowUI(name);
  updateStats();
  renderHistory();

  renderSwimmerPct();

  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    firestoreWrite(currentDate, name, rec.status, rec.note);

}

function toggleNote(name) {
  const k = name.replace(/\s+/g,'_');

  panel.classList.toggle('open');
  if (panel.classList.contains('open')) panel.querySelector('textarea').focus();

function saveNote(name, value) {

  lsSave();

function markAll(status) {

  lsSave();
  renderRoster();
  updateStats();
  renderHistory();
  renderWeeklySummary();

  clearTimeout(saveTimer);

    firestoreWriteDay(currentDate, attendance[currentDate]);

function updateStats() {

  const dates = Object.keys(attendance)
    .filter(d => SWIMMERS.some(sw => attendance[d][sw.name]?.status))
    .sort((a,b) => b.localeCompare(a)).slice(0, 20);

  const grid = document.createElement('div');
  grid.className = 'history-grid';
  dates.forEach(d => {
    let p=0,a=0,u=0;

      if (s==='present') p++; else if (s==='absent') a++; else u++;

// ─────────────────────────────────────────────────────────────────────────────
// WEEKLY SUMMARY
// ─────────────────────────────────────────────────────────────────────────────
function getWeekDates() {
  const today = new Date();
  const dow = today.getDay();
  const mon = new Date(today);
  mon.setDate(today.getDate() - (dow===0?6:dow-1));
  const dates = [];
  for (let i=0;i<5;i++) {
    const d = new Date(mon); d.setDate(mon.getDate()+i);
    dates.push(d.toISOString().split('T')[0]);
  }
  return dates;
}

function renderWeeklySummary() {
  const container = document.getElementById('weekly-container');
  const weekDates = getWeekDates();
  const sessionsHeld = weekDates.filter(d => SWIMMERS.some(sw => attendance[d]?.[sw.name]?.status)).length;
  let totalPresent=0, totalPossible=0;
  weekDates.forEach(d => {
    if (!attendance[d]) return;
    SWIMMERS.forEach(sw => {
      const s = attendance[d][sw.name]?.status;
      if (s==='present'||s==='absent') { totalPossible++; if(s==='present') totalPresent++; }
    });
  });
  const avgPct = totalPossible > 0 ? Math.round(totalPresent/totalPossible*100) : 0;

  let html = `<div class="week-summary-grid">
    <div class="week-stat-card"><div class="week-stat-label">Sessions This Week</div><div class="week-stat-num" style="color:var(--mid)">${sessionsHeld}/5</div></div>
    <div class="week-stat-card"><div class="week-stat-label">Avg Attendance</div><div class="week-stat-num" style="color:var(--green2)">${avgPct}%</div></div>
  </div>`;

  html += '<div style="border:1px solid rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;">';
  const dayNames = ['Mon','Tue','Wed','Thu','Fri'];
  weekDates.forEach((d, i) => {
    let p=0,a=0;
    if (attendance[d]) SWIMMERS.forEach(sw => {
      const s = attendance[d][sw.name]?.status;
      if (s==='present') p++; else if (s==='absent') a++;
    });
    const total = p+a;
    const pct = total>0 ? Math.round(p/total*100) : null;
    const isToday = d===todayStr();
    const label = new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
    html += `<div class="pct-row" style="grid-template-columns:80px 1fr 1fr 60px;${isToday?'background:rgba(33,150,243,0.06);':''}">
      <div style="font-family:'DM Mono',monospace;font-size:.65rem;color:var(--grey)">${dayNames[i]} ${label}</div>
      <div style="font-size:.82rem;color:var(--green2)">${p > 0 ? p+' present' : '—'}</div>
      <div style="font-size:.82rem;color:var(--red2)">${a > 0 ? a+' absent' : '—'}</div>
      <div style="font-family:'DM Mono',monospace;font-size:.72rem;text-align:right;color:${pct!==null?'var(--white)':'var(--grey)'}">${pct!==null?pct+'%':'—'}</div>
    </div>`;
  });
  html += '</div>';
  container.innerHTML = html;
}

// ─────────────────────────────────────────────────────────────────────────────
// SWIMMER ATTENDANCE %
// ─────────────────────────────────────────────────────────────────────────────
function renderSwimmerPct() {
  const container = document.getElementById('swimmers-container');
  const allDates = Object.keys(attendance).filter(d =>
    SWIMMERS.some(sw => attendance[d][sw.name]?.status));

  if (!allDates.length) { container.innerHTML = '<div class="empty-state">No data yet</div>'; return; }

  const rows = SWIMMERS.map(sw => {
    let p=0, total=0;
    allDates.forEach(d => {
      const s = attendance[d]?.[sw.name]?.status;
      if (s==='present'||s==='absent') { total++; if(s==='present') p++; }
    });
    const pct = total > 0 ? Math.round(p/total*100) : null;
    return { sw, p, total, pct };
  }).sort((a,b) => (b.pct??-1) - (a.pct??-1));

  let html = '<div class="swimmer-pct-table">';
  html += `<div class="pct-row header" style="grid-template-columns:1fr 80px 60px;">
    <div>Swimmer</div><div>Attendance</div><div style="text-align:right">%</div></div>`;
  rows.forEach(({sw,p,total,pct}) => {
    const color = pct===null?'var(--grey)':pct>=80?'var(--green2)':pct>=60?'var(--gold)':'var(--red2)';
    html += `<div class="pct-row" style="grid-template-columns:1fr 80px 60px;">
      <div>
        <div class="pct-name">${sw.name}</div>
        <div style="font-family:'DM Mono',monospace;font-size:.55rem;color:var(--grey);text-transform:uppercase;margin-top:.1rem">Lane ${sw.lane}</div>
      </div>
      <div>
        <div class="pct-bar-wrap"><div class="pct-bar-fill" style="width:${pct??0}%;background:${color}"></div></div>
        <div style="font-family:'DM Mono',monospace;font-size:.58rem;color:var(--grey);margin-top:.2rem">${p}/${total} sessions</div>
      </div>
      <div class="pct-num" style="color:${color}">${pct!==null?pct+'%':'—'}</div>
    </div>`;
  });
  html += '</div>';
  container.innerHTML = html;
}

// ─────────────────────────────────────────────────────────────────────────────
// MONTHLY VIEW
// ─────────────────────────────────────────────────────────────────────────────
let monthlyYear  = new Date().getFullYear();
let monthlyMonth = new Date().getMonth(); // 0-indexed

function renderMonthly() {
  const container = document.getElementById('monthly-container');
  const year  = monthlyYear;
  const month = monthlyMonth;

  const monthName = new Date(year, month, 1).toLocaleDateString('en-US', { month:'long', year:'numeric' });
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const todayFull   = todayStr();

  // Collect all practice dates in this month
  const pad = n => String(n).padStart(2,'0');
  const monthPrefix = `${year}-${pad(month+1)}`;
  const sessionDates = Object.keys(attendance)
    .filter(d => d.startsWith(monthPrefix) && SWIMMERS.some(sw => attendance[d]?.[sw.name]?.status));

  // ── TOP STATS ──
  const totalSessions = sessionDates.length;
  let totalPresent = 0, totalPossible = 0;
  sessionDates.forEach(d => {
    SWIMMERS.forEach(sw => {
      const s = attendance[d]?.[sw.name]?.status;
      if (s === 'present' || s === 'absent') {
        totalPossible++;
        if (s === 'present') totalPresent++;
      }
    });
  });
  const avgPct = totalPossible > 0 ? Math.round(totalPresent / totalPossible * 100) : null;

  // ── ROLLING 4-WEEK AVERAGE (all session dates in last 28 days before month start) ──
  const monthStart = new Date(year, month, 1);
  const fourWeeksAgo = new Date(monthStart);
  fourWeeksAgo.setDate(fourWeeksAgo.getDate() - 28);
  const rollingDates = Object.keys(attendance).filter(d => {
    const dt = new Date(d + 'T12:00:00');
    return dt >= fourWeeksAgo && dt < monthStart && SWIMMERS.some(sw => attendance[d]?.[sw.name]?.status);
  });
  let rollingPresent = 0, rollingPossible = 0;
  rollingDates.forEach(d => {
    SWIMMERS.forEach(sw => {
      const s = attendance[d]?.[sw.name]?.status;
      if (s === 'present' || s === 'absent') { rollingPossible++; if (s === 'present') rollingPresent++; }
    });
  });
  const rollingPct = rollingPossible > 0 ? Math.round(rollingPresent / rollingPossible * 100) : null;
  const trendDelta = (avgPct !== null && rollingPct !== null) ? avgPct - rollingPct : null;
  const trendStr = trendDelta === null ? '—'
    : trendDelta > 0 ? `▲ ${trendDelta}% vs 4-wk avg`
    : trendDelta < 0 ? `▼ ${Math.abs(trendDelta)}% vs 4-wk avg`
    : '= 4-wk avg';
  const trendColor = trendDelta === null ? 'var(--grey)' : trendDelta > 0 ? 'var(--green2)' : trendDelta < 0 ? 'var(--red2)' : 'var(--grey)';

  // ── PER-SWIMMER MONTHLY STATS ──
  const swimmerStats = SWIMMERS.map(sw => {
    let p = 0, total = 0;
    sessionDates.forEach(d => {
      const s = attendance[d]?.[sw.name]?.status;
      if (s === 'present' || s === 'absent') { total++; if (s === 'present') p++; }
    });

    // Rolling 4-week avg per swimmer
    let rp = 0, rt = 0;
    rollingDates.forEach(d => {
      const s = attendance[d]?.[sw.name]?.status;
      if (s === 'present' || s === 'absent') { rt++; if (s === 'present') rp++; }
    });
    const pct     = total > 0 ? Math.round(p / total * 100) : null;
    const rolling = rt > 0 ? Math.round(rp / rt * 100) : null;
    const delta   = (pct !== null && rolling !== null) ? pct - rolling : null;

    // Current active streak — scan chronologically, track the LAST unbroken run
    const sortedDates = [...sessionDates].sort();
    let streakCount = 0, streakType = null;
    sortedDates.forEach(d => {
      const s = attendance[d]?.[sw.name]?.status;
      if (s === 'present' || s === 'absent') {
        if (s === streakType) {
          streakCount++;
        } else {
          streakType  = s;
          streakCount = 1;
        }
      }
    });
    // maxConsec still needed for alerts
    let maxConsec = 0, curConsec = 0;
    sortedDates.forEach(d => {
      const s = attendance[d]?.[sw.name]?.status;
      if (s === 'absent') { curConsec++; maxConsec = Math.max(maxConsec, curConsec); }
      else if (s === 'present') curConsec = 0;
    });

    return { sw, p, total, pct, delta, streakCount, streakType, maxConsec };
  });

  // ── ABSENCE ALERTS (3+ consecutive) ──
  const alerts = swimmerStats.filter(r => r.maxConsec >= 3).sort((a,b) => b.maxConsec - a.maxConsec);

  // ── MOM CHART DATA (last 6 months) ──
  const momMonths = [];
  for (let i = 5; i >= 0; i--) {
    let m = month - i, y = year;
    if (m < 0) { m += 12; y--; }
    const pfx = `${y}-${pad(m+1)}`;
    const mDates = Object.keys(attendance).filter(d => d.startsWith(pfx) && SWIMMERS.some(sw => attendance[d]?.[sw.name]?.status));
    let mp = 0, mt = 0;
    mDates.forEach(d => {
      SWIMMERS.forEach(sw => {
        const s = attendance[d]?.[sw.name]?.status;
        if (s === 'present' || s === 'absent') { mt++; if (s === 'present') mp++; }
      });
    });
    momMonths.push({
      label: new Date(y, m, 1).toLocaleDateString('en-US', { month:'short' }),
      pct: mt > 0 ? Math.round(mp / mt * 100) : null
    });
  }

  // ── HEATMAP ──
  const firstDow = new Date(year, month, 1).getDay(); // 0=Sun
  const heatCells = [];
  for (let i = 0; i < firstDow; i++) heatCells.push({ empty: true });
  for (let day = 1; day <= daysInMonth; day++) {
    const dateStr = `${monthPrefix}-${pad(day)}`;
    const isSession = sessionDates.includes(dateStr);
    let pct = null;
    if (isSession) {
      let p = 0, t = 0;
      SWIMMERS.forEach(sw => {
        const s = attendance[dateStr]?.[sw.name]?.status;
        if (s === 'present' || s === 'absent') { t++; if (s === 'present') p++; }
      });
      pct = t > 0 ? Math.round(p / t * 100) : null;
    }
    heatCells.push({ day, dateStr, isSession, pct, isToday: dateStr === todayFull });
  }

  // ── BUILD HTML ──
  let html = '';

  // Month nav
  html += `<div class="month-nav">
    <button class="month-nav-btn" id="month-prev-btn">◀ Prev</button>
    <div class="month-nav-label">${monthName}</div>
    <button class="month-nav-btn" id="month-next-btn">Next ▶</button>
  </div>`;

  // Top stats
  html += `<div class="month-stats-grid">
    <div class="month-stat">
      <div class="month-stat-label">Sessions</div>
      <div class="month-stat-num" style="color:var(--mid)">${totalSessions}</div>
    </div>
    <div class="month-stat">
      <div class="month-stat-label">Avg Attendance</div>
      <div class="month-stat-num" style="color:var(--green2)">${avgPct !== null ? avgPct+'%' : '—'}</div>
    </div>
    <div class="month-stat">
      <div class="month-stat-label">vs Last Month</div>
      <div class="month-stat-num" style="font-size:1rem;padding-top:.4rem;color:${trendColor}">${trendStr}</div>
    </div>
  </div>`;

  // Heatmap
  html += `<div class="heatmap-wrap">
    <div class="heatmap-header">
      ${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div class="heatmap-dow">${d}</div>`).join('')}
    </div>
    <div class="heatmap-grid">`;
  heatCells.forEach(cell => {
    if (cell.empty) { html += `<div class="heatmap-cell empty"></div>`; return; }
    let cls = 'heatmap-cell';
    let title = '';
    if (!cell.isSession) { cls += ' no-session'; title = 'No session'; }
    else if (cell.pct >= 80) { cls += ' pct-high'; title = cell.pct+'% present'; }
    else if (cell.pct >= 60) { cls += ' pct-mid'; title = cell.pct+'% present'; }
    else { cls += ' pct-low'; title = cell.pct !== null ? cell.pct+'% present' : 'Session'; }
    if (cell.isToday) cls += ' today-cell';
    html += `<div class="${cls}" title="${title}">${cell.day}</div>`;
  });
  html += `</div></div>`;

  // Heatmap legend
  html += `<div style="display:flex;gap:1rem;margin-bottom:1.25rem;font-family:'DM Mono',monospace;font-size:.55rem;letter-spacing:.1em;color:var(--grey);text-transform:uppercase;align-items:center;flex-wrap:wrap;">
    <span>Legend:</span>
    <span style="display:flex;align-items:center;gap:.3rem;"><span style="width:10px;height:10px;border-radius:2px;background:rgba(46,125,50,0.7);display:inline-block"></span>≥80%</span>
    <span style="display:flex;align-items:center;gap:.3rem;"><span style="width:10px;height:10px;border-radius:2px;background:rgba(249,168,37,0.5);display:inline-block"></span>60–79%</span>
    <span style="display:flex;align-items:center;gap:.3rem;"><span style="width:10px;height:10px;border-radius:2px;background:rgba(198,40,40,0.55);display:inline-block"></span>&lt;60%</span>
    <span style="display:flex;align-items:center;gap:.3rem;"><span style="width:10px;height:10px;border-radius:2px;background:rgba(255,255,255,0.04);display:inline-block"></span>No session</span>
  </div>`;

  // Month-over-month chart
  html += `<div class="mom-chart">
    <div class="mom-chart-title">Month-over-Month Attendance %</div>
    <div class="mom-bars">`;
  const maxPct = Math.max(...momMonths.map(m => m.pct ?? 0), 1);
  momMonths.forEach(m => {
    const h = m.pct !== null ? Math.round((m.pct / 100) * 72) : 2;
    const barColor = m.pct === null ? 'rgba(255,255,255,0.08)' : m.pct >= 80 ? 'var(--green2)' : m.pct >= 60 ? 'var(--gold)' : 'var(--red2)';
    html += `<div class="mom-bar-wrap">
      <div class="mom-bar-pct">${m.pct !== null ? m.pct+'%' : ''}</div>
      <div class="mom-bar" style="height:${h}px;background:${barColor}"></div>
      <div class="mom-bar-label">${m.label}</div>
    </div>`;
  });
  html += `</div></div>`;

  // Absence alerts
  html += `<div class="alert-section">
    <div class="alert-section-title">⚠ Absence Alerts — 3+ Consecutive Days</div>`;
  if (alerts.length === 0) {
    html += `<div class="no-alerts">✓ No swimmers with 3+ consecutive absences this month</div>`;
  } else {
    alerts.forEach(r => {
      html += `<div class="alert-card">
        <div>
          <div class="alert-name">${r.sw.name}</div>
          <div style="font-family:'DM Mono',monospace;font-size:.58rem;color:var(--grey);margin-top:.15rem">Lane ${r.sw.lane} · ${r.p}/${r.total} sessions attended</div>
        </div>
        <div class="alert-detail">${r.maxConsec} consecutive absences</div>
      </div>`;
    });
  }
  html += `</div>`;

  // Per-swimmer monthly table
  const sorted = [...swimmerStats].sort((a,b) => (b.pct ?? -1) - (a.pct ?? -1));
  html += `<div class="month-swimmer-table">
    <div class="month-swimmer-row msw-header">
      <div>Swimmer</div>
      <div style="text-align:center">Present</div>
      <div style="text-align:center">%</div>
      <div style="text-align:center">Streak</div>
      <div style="text-align:right">vs 4-wk</div>
    </div>`;
  sorted.forEach(({ sw, p, total, pct, delta, streakCount, streakType }) => {
    const color = pct === null ? 'var(--grey)' : pct >= 80 ? 'var(--green2)' : pct >= 60 ? 'var(--gold)' : 'var(--red2)';
    const trendCls = delta === null ? 'trend-eq' : delta > 0 ? 'trend-up' : delta < 0 ? 'trend-dn' : 'trend-eq';
    const trendIcon = delta === null ? '—' : delta > 0 ? `▲ ${delta}%` : delta < 0 ? `▼ ${Math.abs(delta)}%` : '=';
    const streakColor = streakType === 'present' ? 'var(--green2)' : streakType === 'absent' ? 'var(--red2)' : 'var(--grey)';
    const streakIcon  = streakType === 'present' ? '✓' : streakType === 'absent' ? '✗' : '';
    const streakLabel = streakCount > 0 ? `${streakIcon} ${streakCount}` : '—';
    html += `<div class="month-swimmer-row">
      <div>
        <div style="font-size:.85rem;font-weight:500">${sw.name}</div>
        <div style="font-family:'DM Mono',monospace;font-size:.53rem;color:var(--grey);text-transform:uppercase;margin-top:.1rem">Lane ${sw.lane}</div>
      </div>
      <div style="text-align:center;font-family:'DM Mono',monospace;font-size:.72rem;color:var(--grey)">${p}/${total}</div>
      <div style="text-align:center;font-family:'DM Mono',monospace;font-size:.78rem;font-weight:500;color:${color}">${pct !== null ? pct+'%' : '—'}</div>
      <div style="text-align:center;font-family:'DM Mono',monospace;font-size:.65rem;color:${streakColor}">${streakLabel}</div>
      <div style="text-align:right;font-family:'DM Mono',monospace;font-size:.65rem;" class="${trendCls}">${trendIcon}</div>
    </div>`;
  });
  html += `</div>`;

  // Monthly CSV export
  html += `<div style="margin-top:1rem;">
    <button class="export-btn" id="export-monthly-csv-btn" style="width:100%">⬇ Export Monthly CSV</button>
  </div>`;

  container.innerHTML = html;

  // Wire up nav + export after render
  document.getElementById('month-prev-btn').addEventListener('click', () => {
    if (monthlyMonth === 0) { monthlyMonth = 11; monthlyYear--; }
    else { monthlyMonth--; }
    renderMonthly();
  });
  document.getElementById('month-next-btn').addEventListener('click', () => {
    if (monthlyMonth === 11) { monthlyMonth = 0; monthlyYear++; }
    else { monthlyMonth++; }
    renderMonthly();
  });
  document.getElementById('export-monthly-csv-btn').addEventListener('click', exportMonthlyCSV);
}

function exportMonthlyCSV() {
  const year  = monthlyYear;
  const month = monthlyMonth;
  const pad   = n => String(n).padStart(2,'0');
  const monthPrefix = `${year}-${pad(month+1)}`;
  const sessionDates = Object.keys(attendance)
    .filter(d => d.startsWith(monthPrefix) && SWIMMERS.some(sw => attendance[d]?.[sw.name]?.status))
    .sort();

  if (!sessionDates.length) { alert('No session data for this month.'); return; }

  let csv = 'Name,Lane,' + sessionDates.join(',') + ',Total Present,Total Sessions,%\n';
  SWIMMERS.forEach(sw => {
    const row = [sw.name, sw.lane];
    let p = 0, t = 0;
    sessionDates.forEach(d => {
      const s = attendance[d]?.[sw.name]?.status;
      row.push(s === 'present' ? 'P' : s === 'absent' ? 'A' : '');
      if (s === 'present' || s === 'absent') { t++; if (s === 'present') p++; }
    });
    row.push(p, t, t > 0 ? Math.round(p/t*100)+'%' : '—');
    csv += row.map(v => `"${v}"`).join(',') + '\n';
  });

  const monthName = new Date(year, month, 1).toLocaleDateString('en-US', { month:'long', year:'numeric' }).replace(' ','_');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], { type:'text/csv' }));
  a.download = `purple_attendance_${monthName}.csv`;
  a.click();
}

// ─────────────────────────────────────────────────────────────────────────────
// EXPORT
// ─────────────────────────────────────────────────────────────────────────────
function exportCSV() {
  const dates = Object.keys(attendance).sort();
  if (!dates.length) { alert('No data to export yet.'); return; }
  let csv = 'Name,Lane,Age,Gen,' + dates.join(',') + '\n';
  SWIMMERS.forEach(sw => {
    const row = [sw.name, sw.lane, sw.age, sw.gen];
    dates.forEach(d => {
      const s = attendance[d]?.[sw.name]?.status;
      row.push(s==='present'?'P':s==='absent'?'A':'');
    });
    csv += row.map(v=>`"${v}"`).join(',') + '\n';
  });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download = `purple_attendance_${todayStr()}.csv`;
  a.click();
}


function exportSummary() {
  ensureDate(currentDate);
  const data = attendance[currentDate];
  const label = new Date(currentDate+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  let present=[],absent=[],notes=[];
  SWIMMERS.forEach(sw => {
    const rec = data[sw.name];
    if (rec?.status==='present') present.push(sw.name.split(' ')[0]);
    else if (rec?.status==='absent') absent.push(sw.name.split(' ')[0]);
    if (rec?.note) notes.push(`${sw.name.split(' ')[0]}: ${rec.note}`);
  });
  let text = `Purple Group Attendance — ${label}\n`;
  text += `Present (${present.length}): ${present.join(', ')||'—'}\n`;
  text += `Absent (${absent.length}): ${absent.join(', ')||'—'}\n`;
  if (notes.length) text += `Notes:\n${notes.map(n=>'  '+n).join('\n')}`;
  navigator.clipboard.writeText(text).then(() => {
    const btn = event.target;
    const orig = btn.textContent;
    btn.textContent = '✓ Copied!';
    setTimeout(()=>btn.textContent=orig, 2000);
  }).catch(()=>prompt('Copy this summary:',text));
}


// ─────────────────────────────────────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────────────────────────────────────
function boot() {
  // Mark all
  document.getElementById('mark-present-btn').addEventListener('click', () => markAll('present'));
  document.getElementById('mark-absent-btn').addEventListener('click',  () => markAll('absent'));
  document.getElementById('mark-clear-btn').addEventListener('click',   () => markAll('clear'));

  // View tabs
  document.querySelectorAll('.view-tab[data-view]').forEach(tab => {
    tab.addEventListener('click', () => switchView(tab.dataset.view));
  });

  // Roster event delegation
  const rosterContent = document.getElementById('roster-content');
  rosterContent.addEventListener('click', e => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const name = btn.dataset.name;
    const action = btn.dataset.action;
    if (action === 'present' || action === 'absent') setStatus(name, action);
    else if (action === 'note') toggleNote(name);
  });
  rosterContent.addEventListener('input', e => {
    const ta = e.target.closest('textarea[data-name]');
    if (ta) saveNote(ta.dataset.name, ta.value);
  });

  // Export
  document.getElementById('export-csv-btn').addEventListener('click', exportCSV);
  document.getElementById('export-summary-btn').addEventListener('click', exportSummary);

  initApp();
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', boot);
} else {
  boot();
}
</script>
</body>
</html>
