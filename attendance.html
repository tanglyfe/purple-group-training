<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Attendance — SSF Aquatics</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* Sidebar layout scroll fix */
  .ssf-main { overflow-y: auto !important; }
  body::before { z-index: -1; }
  .shimmer-bg { z-index: -1; }

  :root {
    --deep:#071429; --navy:#0B1F3A; --mid:#2196F3; --light:#64B5F6;
    --gold:#F9A825; --white:#F0F6FF; --grey:#8BA3C0;
    --border:rgba(33,150,243,0.12);
    --green2:#66BB6A; --red2:#EF5350; --present-bg:rgba(27,94,32,0.12);
    --present-border:rgba(102,187,106,0.5); --absent-bg:rgba(183,28,28,0.1);
    --absent-border:rgba(239,83,80,0.5);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--deep);color:var(--white);font-family:'DM Sans',sans-serif;font-weight:300;}
  body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(180deg,transparent 0px,transparent 58px,rgba(33,150,243,0.04) 58px,rgba(33,150,243,0.04) 60px);pointer-events:none;z-index:0;}
  .shimmer-bg{position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(21,101,192,0.15) 0%,transparent 70%);pointer-events:none;z-index:0;}

  /* ── GROUP BAR ── */
  .group-bar{position:sticky;top:0;z-index:50;background:rgba(7,20,41,0.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:.55rem 1rem;display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;}
  .group-bar-label{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--grey);white-space:nowrap;}
  .group-pill{padding:.28rem .75rem;border-radius:20px;border:1px solid rgba(33,150,243,0.2);background:transparent;color:var(--grey);font-family:'DM Sans',sans-serif;font-size:.78rem;cursor:pointer;transition:all .15s;white-space:nowrap;}
  .group-pill:hover{color:var(--white);}
  .group-pill.active{color:#fff;}

  /* ── DATE BAR ── */
  .date-bar{position:sticky;top:41px;z-index:49;background:rgba(7,20,41,0.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:.55rem 1rem;}
  .date-row{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;}
  .date-label{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--grey);}
  .date-input{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:4px;color:var(--white);font-family:'DM Mono',monospace;font-size:.8rem;padding:.3rem .6rem;outline:none;}
  .day-quick-btns{display:flex;gap:.3rem;flex-wrap:wrap;}
  .day-btn{padding:.25rem .55rem;border-radius:4px;border:1px solid rgba(255,255,255,0.08);background:transparent;color:var(--grey);font-family:'DM Mono',monospace;font-size:.65rem;cursor:pointer;transition:all .15s;}
  .day-btn:hover{color:var(--white);border-color:rgba(255,255,255,0.2);}
  .day-btn.today{border-color:rgba(33,150,243,0.4);color:var(--light);}
  .date-meta{display:flex;align-items:center;gap:.75rem;margin-top:.3rem;}
  .current-date-label{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--grey);}
  .sync-status{font-family:'DM Mono',monospace;font-size:.6rem;padding:.15rem .5rem;border-radius:3px;margin-left:auto;}
  .sync-status.synced{color:var(--green2);background:rgba(102,187,106,0.08);}
  .sync-status.syncing{color:var(--gold);background:rgba(249,168,37,0.08);}
  .sync-status.error{color:var(--red2);background:rgba(239,83,80,0.08);}

  /* ── STATS BAR ── */
  .stats-bar{display:flex;gap:.75rem;align-items:center;padding:.5rem 1rem;border-bottom:1px solid var(--border);flex-wrap:wrap;}
  .stat-pill{display:flex;align-items:center;gap:.4rem;font-size:.82rem;}
  .stat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .stat-num{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;}

  /* ── MARK ALL ── */
  .mark-all-bar{display:flex;gap:.5rem;padding:.5rem 1rem;border-bottom:1px solid var(--border);flex-wrap:wrap;}
  .mark-all-btn{padding:.35rem .9rem;border-radius:6px;border:none;font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.08em;cursor:pointer;transition:all .15s;}
  .mark-all-btn.present{background:rgba(46,125,50,0.2);color:var(--green2);}
  .mark-all-btn.present:hover{background:rgba(46,125,50,0.35);}
  .mark-all-btn.absent{background:rgba(198,40,40,0.2);color:var(--red2);}
  .mark-all-btn.absent:hover{background:rgba(198,40,40,0.35);}
  .mark-all-btn.clear{background:rgba(255,255,255,0.05);color:var(--grey);}
  .mark-all-btn.clear:hover{background:rgba(255,255,255,0.1);color:var(--white);}

  /* ── ROSTER ── */
  .content{padding:.75rem 1rem 1rem;position:relative;z-index:1;}
  .lane-header{padding:.55rem .9rem;display:flex;align-items:center;justify-content:space-between;border-radius:2px 2px 0 0;}
  .lane-header h2{font-family:'Bebas Neue',sans-serif;font-size:1.05rem;letter-spacing:.04em;}
  .lane-count{font-family:'DM Mono',monospace;font-size:.6rem;color:rgba(255,255,255,0.5);}
  .swimmer-row{display:flex;align-items:center;gap:.75rem;padding:.6rem .9rem;background:rgba(255,255,255,0.02);border-bottom:1px solid rgba(255,255,255,0.04);transition:background .15s;position:relative;border-left:3px solid transparent;}
  .swimmer-row:last-child{border-bottom:none;}
  .swimmer-row.is-present{background:var(--present-bg);border-left-color:var(--present-border);}
  .swimmer-row.is-absent{background:var(--absent-bg);border-left-color:var(--absent-border);}
  .swimmer-info{flex:1;min-width:0;}
  .swimmer-name{font-size:.9rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .swimmer-meta{font-family:'DM Mono',monospace;font-size:.56rem;letter-spacing:.08em;color:var(--grey);text-transform:uppercase;margin-top:.1rem;}
  .att-btns{display:flex;gap:.35rem;flex-shrink:0;}
  .att-btn{width:40px;height:40px;border-radius:2px;border:1px solid rgba(255,255,255,0.08);background:transparent;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
  .att-btn.present-btn{color:var(--green2);border-color:rgba(102,187,106,0.2);}
  .att-btn.absent-btn{color:var(--red2);border-color:rgba(239,83,80,0.2);}
  .att-btn.note-btn{color:var(--grey);border-color:rgba(255,255,255,0.08);font-size:.85rem;}
  .att-btn.present-btn.active{background:rgba(46,125,50,0.3);border-color:var(--green2);}
  .att-btn.absent-btn.active{background:rgba(198,40,40,0.3);border-color:var(--red2);}
  .att-btn.note-btn.has-note{color:var(--gold);border-color:rgba(249,168,37,0.4);}
  .note-panel{display:none;padding:.4rem .9rem .5rem;background:rgba(0,0,0,0.2);}
  .note-panel.open{display:block;}
  .note-input{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:2px;color:var(--white);font-family:'DM Mono',monospace;font-size:.72rem;padding:.4rem .6rem;outline:none;resize:vertical;min-height:50px;}

  /* ── VIEW TABS ── */
  .view-tabs{display:flex;gap:1px;margin:.75rem 1rem 0;border-bottom:1px solid var(--border);}
  .view-tab{padding:.5rem .9rem;font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;color:var(--grey);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;background:none;border-top:none;border-left:none;border-right:none;}
  .view-tab:hover{color:var(--white);}
  .view-tab.active{color:var(--gold);border-bottom-color:var(--gold);}
  .view-panel{display:none;padding:.75rem 1rem 3rem;}
  .view-panel.active{display:block;}

  /* ── HISTORY ── */
  .history-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:.75rem;}
  .history-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:6px;padding:.75rem;cursor:pointer;transition:background .15s;}
  .history-card:hover{background:rgba(33,150,243,0.07);}
  .history-date{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--grey);margin-bottom:.4rem;}
  .history-summary{font-size:.78rem;line-height:1.6;margin-bottom:.4rem;}
  .history-bar{display:flex;height:4px;border-radius:2px;overflow:hidden;gap:1px;}
  .history-bar-present{background:var(--green2);}
  .history-bar-absent{background:var(--red2);}
  .history-bar-unset{background:rgba(255,255,255,0.1);}

  /* ── WEEKLY ── */
  .week-summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:.75rem;}
  .week-stat-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:6px;padding:.75rem;}
  .week-stat-label{font-family:'DM Mono',monospace;font-size:.58rem;color:var(--grey);text-transform:uppercase;margin-bottom:.25rem;}
  .week-stat-num{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;line-height:1;}
  .pct-row{display:grid;gap:.5rem;padding:.45rem .75rem;border-bottom:1px solid rgba(255,255,255,0.04);align-items:center;font-size:.82rem;}
  .pct-row:last-child{border-bottom:none;}
  .pct-row.header{font-family:'DM Mono',monospace;font-size:.55rem;letter-spacing:.1em;color:var(--grey);text-transform:uppercase;background:rgba(255,255,255,0.02);}

  /* ── SWIMMER PCT ── */
  .swimmer-pct-table{border:1px solid rgba(255,255,255,0.06);border-radius:4px;overflow:hidden;}
  .pct-name{font-size:.85rem;font-weight:500;}
  .pct-bar-wrap{height:4px;background:rgba(255,255,255,0.06);border-radius:2px;margin-bottom:.2rem;}
  .pct-bar-fill{height:100%;border-radius:2px;transition:width .4s;}
  .pct-num{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;text-align:right;}

  /* ── MONTHLY ── */
  .month-nav{display:flex;align-items:center;gap:.75rem;margin-bottom:.75rem;}
  .month-nav-btn{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:4px;color:var(--white);font-size:.9rem;cursor:pointer;padding:.25rem .6rem;transition:background .15s;}
  .month-nav-btn:hover{background:rgba(255,255,255,0.1);}
  .month-title{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:.04em;}
  .month-stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;margin-bottom:.75rem;}
  .month-stat{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:6px;padding:.6rem .75rem;}
  .month-stat-val{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;line-height:1;}
  .month-stat-label{font-family:'DM Mono',monospace;font-size:.55rem;color:var(--grey);text-transform:uppercase;}
  .month-swimmer-table{border:1px solid rgba(255,255,255,0.06);border-radius:4px;overflow:hidden;margin-bottom:1rem;}
  .month-swimmer-row{display:grid;grid-template-columns:1fr 55px 55px 55px 70px;gap:.4rem;align-items:center;padding:.5rem .75rem;border-bottom:1px solid rgba(255,255,255,0.04);}
  .month-swimmer-row:last-child{border-bottom:none;}
  .month-swimmer-row:hover{background:rgba(255,255,255,0.02);}
  .month-swimmer-row.msw-header{background:rgba(255,255,255,0.03);font-family:'DM Mono',monospace;font-size:.52rem;letter-spacing:.1em;color:var(--grey);text-transform:uppercase;}

  /* ── EXPORT ── */
  .export-bar{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:.75rem;}
  .export-btn{padding:.35rem .8rem;border-radius:6px;border:1px solid rgba(33,150,243,0.2);background:transparent;color:var(--light);font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.08em;cursor:pointer;transition:all .15s;}
  .export-btn:hover{background:rgba(33,150,243,0.1);}
  .empty-state{text-align:center;padding:2rem;color:var(--grey);font-size:.85rem;}
</style>
</head>
<body data-page="attendance">
<div class="shimmer-bg"></div>

<!-- GROUP SELECTOR -->
<div class="group-bar" id="group-bar">
  <span class="group-bar-label">Group</span>
  <div id="group-pills" style="display:flex;gap:.4rem;flex-wrap:wrap;"></div>
</div>

<!-- DATE BAR -->
<div class="date-bar">
  <div class="date-row">
    <span class="date-label">Date</span>
    <input type="date" class="date-input" id="date-picker">
    <div class="day-quick-btns" id="week-btns"></div>
  </div>
  <div class="date-meta">
    <span class="current-date-label" id="current-date-label"></span>
    <span class="sync-status synced" id="sync-status">✓ Ready</span>
  </div>
</div>

<!-- STATS -->
<div class="stats-bar">
  <div class="stat-pill"><div class="stat-dot" style="background:var(--green2)"></div><span class="stat-num" id="stat-present">0</span><span style="color:var(--grey);font-size:.82rem">Present</span></div>
  <div class="stat-pill"><div class="stat-dot" style="background:var(--red2)"></div><span class="stat-num" id="stat-absent">0</span><span style="color:var(--grey);font-size:.82rem">Absent</span></div>
  <div class="stat-pill"><div class="stat-dot" style="background:rgba(255,255,255,0.15)"></div><span class="stat-num" id="stat-unset">0</span><span style="color:var(--grey);font-size:.82rem">Unmarked</span></div>
</div>

<!-- MARK ALL -->
<div class="mark-all-bar">
  <button class="mark-all-btn present" id="mark-present-btn">✓ Mark All Present</button>
  <button class="mark-all-btn absent" id="mark-absent-btn">✗ Mark All Absent</button>
  <button class="mark-all-btn clear" id="mark-clear-btn">Clear</button>
</div>

<!-- ROSTER -->
<div class="content" id="roster-content"></div>

<!-- VIEW TABS -->
<div class="view-tabs">
  <button class="view-tab active" data-view="history">📅 History</button>
  <button class="view-tab" data-view="weekly">📊 Weekly</button>
  <button class="view-tab" data-view="swimmers">🏊 Swimmers</button>
  <button class="view-tab" data-view="monthly">📆 Monthly</button>
</div>

<div class="view-panel active" id="panel-history"><div id="history-container"></div></div>
<div class="view-panel" id="panel-weekly"><div id="weekly-container"></div></div>
<div class="view-panel" id="panel-swimmers"><div id="swimmers-container"></div></div>
<div class="view-panel" id="panel-monthly">
  <div class="month-nav">
    <button class="month-nav-btn" id="month-prev-btn">&#8592;</button>
    <span class="month-title" id="month-title"></span>
    <button class="month-nav-btn" id="month-next-btn">&#8594;</button>
  </div>
  <div class="month-stats-row" id="month-stats-row"></div>
  <div class="export-bar">
    <button class="export-btn" id="export-monthly-csv-btn">&#128229; Export Monthly CSV</button>
  </div>
  <div id="monthly-container"></div>
</div>

<div style="padding:.75rem 1rem;border-top:1px solid var(--border);display:flex;gap:.5rem;flex-wrap:wrap;">
  <button class="export-btn" id="export-csv-btn">&#128229; Export Full CSV</button>
  <button class="export-btn" id="export-summary-btn">&#128203; Copy Today Summary</button>
</div>

<script src="sidebar.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
import {
  getFirestore, doc, getDoc, setDoc, getDocs,
  collection, query, where, deleteField
} from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA-hATur1TXeZePf4W4lqDTsxNRIg0NKfs",
  authDomain: "ssfaquatics.firebaseapp.com",
  projectId: "ssfaquatics",
  storageBucket: "ssfaquatics.firebasestorage.app",
  messagingSenderId: "21079628309",
  appId: "1:21079628309:web:8958a334f5cd5a69ae4c1c"
};
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);
const LS_KEY = 'ssf_attendance_v2';

// ── STATE ──
let SWIMMERS = [];
let allGroups = [];
let selectedGroupId = 'all';
let currentDate = todayStr();
let attendance = {};
let saveTimer = null;

function todayStr() { return new Date().toISOString().split('T')[0]; }

// ── SYNC STATUS ──
function setSyncStatus(state, msg) {
  const el = document.getElementById('sync-status');
  el.className = 'sync-status ' + state;
  el.textContent = msg;
}

// ── FIRESTORE ──
async function firestoreReadDate(date) {
  try {
    setSyncStatus('syncing', '⟳ Loading…');
    const snap = await getDoc(doc(db, 'attendance', date));
    setSyncStatus('synced', '✓ Synced');
    return snap.exists() ? snap.data() : null;
  } catch(e) { setSyncStatus('error', '✗ Offline'); return null; }
}

async function firestoreReadAll() {
  try {
    setSyncStatus('syncing', '⟳ Loading…');
    const snap = await getDocs(collection(db, 'attendance'));
    setSyncStatus('synced', '✓ Synced');
    const result = {};
    snap.forEach(d => { result[d.id] = d.data(); });
    return result;
  } catch(e) { setSyncStatus('error', '✗ Offline'); return null; }
}

async function firestoreWrite(date, name, status, note) {
  try {
    setSyncStatus('syncing', '⟳ Saving…');
    await setDoc(doc(db, 'attendance', date), {
      [name]: { status: status || '', note: note || '' }
    }, { merge: true });
    setSyncStatus('synced', '✓ Saved');
    lsSave();
  } catch(e) { setSyncStatus('error', '✗ Offline'); }
}

async function firestoreWriteDay(date, records) {
  try {
    setSyncStatus('syncing', '⟳ Saving…');
    await setDoc(doc(db, 'attendance', date), records);
    setSyncStatus('synced', '✓ Saved');
    lsSave();
  } catch(e) { setSyncStatus('error', '✗ Offline'); }
}

// ── LOCAL STORAGE ──
function lsLoad() { try { return JSON.parse(localStorage.getItem(LS_KEY)) || {}; } catch(e) { return {}; } }
function lsSave() { try { localStorage.setItem(LS_KEY, JSON.stringify(attendance)); } catch(e) {} }

// ── DATA HELPERS ──
function ensureDate(d) {
  if (!attendance[d]) {
    attendance[d] = {};
    SWIMMERS.forEach(s => { attendance[d][s.name] = { status: null, note: '' }; });
  }
}
function getRecord(d, name) {
  ensureDate(d);
  if (!attendance[d][name]) attendance[d][name] = { status: null, note: '' };
  return attendance[d][name];
}

// ── LOAD GROUPS + SWIMMERS ──
async function loadGroupsAndSwimmers() {
  const [grSnap, swSnap] = await Promise.all([
    getDocs(collection(db, 'groups')),
    getDocs(query(collection(db, 'swimmers'), where('active', '==', true)))
  ]);

  allGroups = grSnap.docs.map(d => ({ id: d.id, ...d.data() }))
    .sort((a,b) => a.name.localeCompare(b.name));

  const all = swSnap.docs.map(d => ({ firestoreId: d.id, ...d.data() }))
    .sort((a,b) => a.name.localeCompare(b.name));

  // Build group pills
  const pillsEl = document.getElementById('group-pills');
  const total = all.length;
  const pills = [
    `<button class="group-pill active" data-gid="all" style="background:rgba(33,150,243,0.2);border-color:var(--mid);color:#fff">All (${total})</button>`,
    ...allGroups.map(g => {
      const cnt = (g.swimmerIds||[]).length;
      return `<button class="group-pill" data-gid="${g.id}" data-color="${g.color||'#1565C0'}">${g.name} (${cnt})</button>`;
    })
  ].join('');
  pillsEl.innerHTML = pills;

  pillsEl.querySelectorAll('.group-pill').forEach(btn => {
    btn.addEventListener('click', () => {
      pillsEl.querySelectorAll('.group-pill').forEach(b => {
        b.classList.remove('active');
        b.style.background = ''; b.style.borderColor = ''; b.style.color = '';
      });
      btn.classList.add('active');
      const color = btn.dataset.color || '#2196F3';
      btn.style.background = color + '33';
      btn.style.borderColor = color;
      btn.style.color = '#fff';
      selectedGroupId = btn.dataset.gid;
      updateSwimmerList(all);
      ensureDate(currentDate);
      renderRoster();
      updateStats();
    });
  });

  updateSwimmerList(all);
}

function updateSwimmerList(allFirestoreSwimmers) {
  let src = allFirestoreSwimmers;
  if (selectedGroupId !== 'all') {
    const group = allGroups.find(g => g.id === selectedGroupId);
    const ids = new Set(group?.swimmerIds || []);
    src = src.filter(s => ids.has(s.firestoreId));
  }
  SWIMMERS = src.map(s => ({
    name: s.name,
    age: s.age || null,
    gen: s.gender || '',
    id: s.firestoreId,
    groupId: s.groupId || null,
    groupName: s.groupName || null,
    groupColor: s.groupColor || null,
  }));
}

// ── INIT ──
async function initApp() {
  await loadGroupsAndSwimmers();

  attendance = lsLoad();
  currentDate = todayStr();
  document.getElementById('date-picker').value = currentDate;
  document.getElementById('date-picker').addEventListener('change', e => switchDate(e.target.value));

  buildWeekBtns();
  updateCurrentDateLabel();
  ensureDate(currentDate);
  renderRoster();
  updateStats();

  // Merge today from Firestore
  const todayData = await firestoreReadDate(currentDate);
  if (todayData) {
    attendance[currentDate] = {};
    SWIMMERS.forEach(sw => {
      attendance[currentDate][sw.name] = {
        status: todayData[sw.name]?.status || null,
        note: todayData[sw.name]?.note || ''
      };
    });
    lsSave(); renderRoster(); updateStats();
  }

  // Load all history for analytics tabs
  const allData = await firestoreReadAll();
  if (allData) {
    Object.keys(allData).forEach(date => {
      if (!attendance[date]) {
        attendance[date] = {};
        SWIMMERS.forEach(sw => { attendance[date][sw.name] = { status: null, note: '' }; });
      }
      SWIMMERS.forEach(sw => {
        attendance[date][sw.name] = allData[date][sw.name] || { status: null, note: '' };
      });
    });
    lsSave();
  }
  renderHistory(); renderWeeklySummary(); renderSwimmerPct();
}

function buildWeekBtns() {
  const today = new Date();
  const dow = today.getDay();
  const mon = new Date(today);
  mon.setDate(today.getDate() - (dow===0?6:dow-1));
  const days = ['M','T','W','Th','F'];
  const container = document.getElementById('week-btns');
  container.innerHTML = '';
  for (let i=0;i<5;i++) {
    const d = new Date(mon); d.setDate(mon.getDate()+i);
    const ds = d.toISOString().split('T')[0];
    const btn = document.createElement('button');
    btn.className = 'day-btn' + (ds===currentDate?' today':'');
    btn.textContent = days[i];
    btn.dataset.date = ds;
    btn.addEventListener('click', () => switchDate(ds));
    container.appendChild(btn);
  }
}

function updateCurrentDateLabel() {
  const d = new Date(currentDate + 'T12:00:00');
  document.getElementById('current-date-label').textContent =
    d.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
}

async function switchDate(d) {
  currentDate = d;
  document.getElementById('date-picker').value = d;
  updateCurrentDateLabel();
  buildWeekBtns();
  ensureDate(d);
  renderRoster();
  updateStats();

  const data = await firestoreReadDate(d);
  if (data) {
    attendance[d] = {};
    SWIMMERS.forEach(sw => {
      attendance[d][sw.name] = { status: data[sw.name]?.status || null, note: data[sw.name]?.note || '' };
    });
    lsSave(); renderRoster(); updateStats();
  }
  renderHistory(); renderWeeklySummary();
}

// ── ROSTER RENDER ──
function renderRoster() {
  ensureDate(currentDate);
  const container = document.getElementById('roster-content');
  container.innerHTML = '';

  if (!SWIMMERS.length) {
    container.innerHTML = '<div class="empty-state">No swimmers in this group.<br><a href="groups.html" style="color:var(--light)">Manage Groups →</a></div>';
    return;
  }

  // Build sections
  let sections;
  if (selectedGroupId === 'all') {
    const byGroup = {};
    SWIMMERS.forEach(sw => {
      const key = sw.groupName || 'Unassigned';
      const color = sw.groupColor || '#8BA3C0';
      if (!byGroup[key]) byGroup[key] = { swimmers: [], color };
      byGroup[key].swimmers.push(sw);
    });
    sections = Object.entries(byGroup).map(([name, { swimmers, color }]) => ({ name, swimmers, color }));
  } else {
    const group = allGroups.find(g => g.id === selectedGroupId);
    sections = [{ name: group?.name || 'Group', swimmers: SWIMMERS, color: group?.color || '#2196F3' }];
  }

  sections.forEach(section => {
    if (!section.swimmers.length) return;

    const hdr = document.createElement('div');
    hdr.className = 'lane-header';
    hdr.style.cssText = `background:${section.color}22;border-left:4px solid ${section.color};border-radius:2px 2px 0 0;margin-top:.5rem;`;
    hdr.innerHTML = `<h2>${section.name}</h2><span class="lane-count">${section.swimmers.length} swimmers</span>`;
    container.appendChild(hdr);

    const wrap = document.createElement('div');
    wrap.style.cssText = 'border:1px solid rgba(255,255,255,0.06);border-top:none;border-radius:0 0 4px 4px;margin-bottom:.5rem;overflow:hidden;';

    section.swimmers.forEach(sw => {
      const rec = getRecord(currentDate, sw.name);
      const k = sw.name.replace(/\s+/g,'_');

      const row = document.createElement('div');
      row.className = `swimmer-row ${rec.status ? 'is-'+rec.status : ''}`;
      row.id = `row-${k}`;
      row.innerHTML = `
        <div class="swimmer-info">
          <div class="swimmer-name">${sw.name}</div>
          <div class="swimmer-meta">${sw.age ? 'Age '+sw.age+' · ' : ''}${sw.gen}</div>
        </div>
        <div class="att-btns">
          <button class="att-btn present-btn ${rec.status==='present'?'active':''}"
            data-name="${sw.name}" data-action="present" title="Present">✓</button>
          <button class="att-btn absent-btn ${rec.status==='absent'?'active':''}"
            data-name="${sw.name}" data-action="absent" title="Absent">✗</button>
          <button class="att-btn note-btn ${rec.note?'has-note':''}"
            data-name="${sw.name}" data-action="note" title="Note">📝</button>
        </div>`;
      wrap.appendChild(row);

      const notePanel = document.createElement('div');
      notePanel.className = 'note-panel';
      notePanel.id = `note-panel-${k}`;
      notePanel.innerHTML = `<textarea class="note-input" placeholder="Note for ${sw.name.split(' ')[0]}…"
        data-name="${sw.name}">${rec.note||''}</textarea>`;
      wrap.appendChild(notePanel);
    });

    container.appendChild(wrap);
  });
}

// ── ACTIONS ──
function setStatus(name, status) {
  ensureDate(currentDate);
  const rec = getRecord(currentDate, name);
  rec.status = rec.status === status ? null : status;
  lsSave();
  updateRowUI(name);
  updateStats();
  renderHistory();
  renderWeeklySummary();
  renderSwimmerPct();
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => firestoreWrite(currentDate, name, rec.status, rec.note), 800);
}

function toggleNote(name) {
  const k = name.replace(/\s+/g,'_');
  document.getElementById(`note-panel-${k}`)?.classList.toggle('open');
}

function saveNote(name, value) {
  ensureDate(currentDate);
  const rec = getRecord(currentDate, name);
  rec.note = value;
  lsSave();
  const k = name.replace(/\s+/g,'_');
  const noteBtn = document.querySelector(`#row-${k} .note-btn`);
  if (noteBtn) noteBtn.classList.toggle('has-note', !!value);
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => firestoreWrite(currentDate, name, rec.status, rec.note), 1200);
}

function updateRowUI(name) {
  const k = name.replace(/\s+/g,'_');
  const row = document.getElementById(`row-${k}`);
  if (!row) return;
  const rec = getRecord(currentDate, name);
  row.className = `swimmer-row ${rec.status ? 'is-'+rec.status : ''}`;
  row.querySelector('.present-btn')?.classList.toggle('active', rec.status==='present');
  row.querySelector('.absent-btn')?.classList.toggle('active', rec.status==='absent');
}

function markAll(status) {
  ensureDate(currentDate);
  SWIMMERS.forEach(sw => { getRecord(currentDate, sw.name).status = status === 'clear' ? null : status; });
  lsSave(); renderRoster(); updateStats(); renderHistory(); renderWeeklySummary();
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => firestoreWriteDay(currentDate, attendance[currentDate]), 800);
}

function updateStats() {
  ensureDate(currentDate);
  let p=0, a=0, u=0;
  SWIMMERS.forEach(sw => {
    const s = attendance[currentDate]?.[sw.name]?.status;
    if (s==='present') p++; else if (s==='absent') a++; else u++;
  });
  document.getElementById('stat-present').textContent = p;
  document.getElementById('stat-absent').textContent = a;
  document.getElementById('stat-unset').textContent = u;
}

// ── VIEW TABS ──
function switchView(view) {
  document.querySelectorAll('.view-tab').forEach(t => t.classList.toggle('active', t.dataset.view === view));
  document.querySelectorAll('.view-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`panel-${view}`).classList.add('active');
  if (view === 'monthly') renderMonthly();
}

// ── HISTORY ──
function renderHistory() {
  const container = document.getElementById('history-container');
  const dates = Object.keys(attendance)
    .filter(d => SWIMMERS.some(sw => attendance[d][sw.name]?.status))
    .sort((a,b) => b.localeCompare(a)).slice(0, 20);
  if (!dates.length) { container.innerHTML = '<div class="empty-state">No sessions recorded yet</div>'; return; }
  const grid = document.createElement('div');
  grid.className = 'history-grid';
  dates.forEach(d => {
    let p=0,a=0,u=0;
    SWIMMERS.forEach(sw => { const s=attendance[d][sw.name]?.status; if(s==='present')p++; else if(s==='absent')a++; else u++; });
    const label = new Date(d+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
    const card = document.createElement('div');
    card.className = 'history-card';
    card.onclick = () => switchDate(d);
    card.innerHTML = `<div class="history-date">${label}</div>
      <div class="history-summary"><span style="color:var(--green2)">${p} present</span><br><span style="color:var(--red2)">${a} absent</span></div>
      <div class="history-bar">
        <div class="history-bar-present" style="flex:${p}"></div>
        <div class="history-bar-absent" style="flex:${a}"></div>
        <div class="history-bar-unset" style="flex:${u}"></div>
      </div>`;
    grid.appendChild(card);
  });
  container.innerHTML = ''; container.appendChild(grid);
}

// ── WEEKLY ──
function getWeekDates() {
  const today = new Date(); const dow = today.getDay();
  const mon = new Date(today); mon.setDate(today.getDate()-(dow===0?6:dow-1));
  const dates = [];
  for (let i=0;i<5;i++) { const d=new Date(mon); d.setDate(mon.getDate()+i); dates.push(d.toISOString().split('T')[0]); }
  return dates;
}

function renderWeeklySummary() {
  const container = document.getElementById('weekly-container');
  const weekDates = getWeekDates();
  const sessionsHeld = weekDates.filter(d => SWIMMERS.some(sw => attendance[d]?.[sw.name]?.status)).length;
  let totalPresent=0, totalPossible=0;
  weekDates.forEach(d => { if(!attendance[d])return; SWIMMERS.forEach(sw => { const s=attendance[d][sw.name]?.status; if(s==='present'||s==='absent'){totalPossible++;if(s==='present')totalPresent++;}}); });
  const avgPct = totalPossible > 0 ? Math.round(totalPresent/totalPossible*100) : 0;
  let html = `<div class="week-summary-grid">
    <div class="week-stat-card"><div class="week-stat-label">Sessions This Week</div><div class="week-stat-num" style="color:var(--mid)">${sessionsHeld}/5</div></div>
    <div class="week-stat-card"><div class="week-stat-label">Avg Attendance</div><div class="week-stat-num" style="color:var(--green2)">${avgPct}%</div></div>
  </div>`;
  html += '<div style="border:1px solid rgba(255,255,255,0.06);border-radius:4px;overflow:hidden;">';
  const dayNames=['Mon','Tue','Wed','Thu','Fri'];
  weekDates.forEach((d,i) => {
    let p=0,a=0; if(attendance[d])SWIMMERS.forEach(sw=>{const s=attendance[d][sw.name]?.status;if(s==='present')p++;else if(s==='absent')a++;});
    const total=p+a; const pct=total>0?Math.round(p/total*100):null;
    const isToday=d===todayStr();
    const label=new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
    html+=`<div class="pct-row" style="grid-template-columns:80px 1fr 1fr 60px;${isToday?'background:rgba(33,150,243,0.06);':''}">
      <div style="font-family:'DM Mono',monospace;font-size:.65rem;color:var(--grey)">${dayNames[i]} ${label}</div>
      <div style="font-size:.82rem;color:var(--green2)">${p>0?p+' present':'—'}</div>
      <div style="font-size:.82rem;color:var(--red2)">${a>0?a+' absent':'—'}</div>
      <div style="font-family:'DM Mono',monospace;font-size:.72rem;text-align:right;color:${pct!==null?'var(--white)':'var(--grey)'}">${pct!==null?pct+'%':'—'}</div>
    </div>`;
  });
  html += '</div>';
  container.innerHTML = html;
}

// ── SWIMMER % ──
function renderSwimmerPct() {
  const container = document.getElementById('swimmers-container');
  const allDates = Object.keys(attendance).filter(d => SWIMMERS.some(sw => attendance[d][sw.name]?.status));
  if (!allDates.length) { container.innerHTML = '<div class="empty-state">No data yet</div>'; return; }
  const rows = SWIMMERS.map(sw => {
    let p=0,total=0;
    allDates.forEach(d => { const s=attendance[d]?.[sw.name]?.status; if(s==='present'||s==='absent'){total++;if(s==='present')p++;} });
    return { sw, p, total, pct: total>0?Math.round(p/total*100):null };
  }).sort((a,b) => (b.pct??-1)-(a.pct??-1));
  let html = '<div class="swimmer-pct-table">';
  html += `<div class="pct-row header" style="grid-template-columns:1fr 80px 60px"><div>Swimmer</div><div>Attendance</div><div style="text-align:right">%</div></div>`;
  rows.forEach(({sw,p,total,pct}) => {
    const color = pct===null?'var(--grey)':pct>=80?'var(--green2)':pct>=60?'var(--gold)':'var(--red2)';
    html += `<div class="pct-row" style="grid-template-columns:1fr 80px 60px">
      <div><div class="pct-name">${sw.name}</div><div style="font-family:'DM Mono',monospace;font-size:.55rem;color:var(--grey)">${sw.groupName||''}</div></div>
      <div><div class="pct-bar-wrap"><div class="pct-bar-fill" style="width:${pct??0}%;background:${color}"></div></div>
        <div style="font-family:'DM Mono',monospace;font-size:.58rem;color:var(--grey)">${p}/${total} sessions</div></div>
      <div class="pct-num" style="color:${color}">${pct!==null?pct+'%':'—'}</div>
    </div>`;
  });
  html += '</div>'; container.innerHTML = html;
}

// ── MONTHLY ──
let monthlyYear = new Date().getFullYear();
let monthlyMonth = new Date().getMonth();

function renderMonthly() {
  const container = document.getElementById('monthly-container');
  const year=monthlyYear, month=monthlyMonth;
  const monthName = new Date(year,month,1).toLocaleDateString('en-US',{month:'long',year:'numeric'});
  document.getElementById('month-title').textContent = monthName;
  const pad = n => String(n).padStart(2,'0');
  const monthPrefix = `${year}-${pad(month+1)}`;
  const sessionDates = Object.keys(attendance)
    .filter(d => d.startsWith(monthPrefix) && SWIMMERS.some(sw => attendance[d]?.[sw.name]?.status)).sort();
  let totalPresent=0,totalPossible=0;
  sessionDates.forEach(d => { SWIMMERS.forEach(sw => { const s=attendance[d]?.[sw.name]?.status; if(s==='present'||s==='absent'){totalPossible++;if(s==='present')totalPresent++;} }); });
  const avgPct = totalPossible>0?Math.round(totalPresent/totalPossible*100):null;
  document.getElementById('month-stats-row').innerHTML = `
    <div class="month-stat"><div class="month-stat-val" style="color:var(--mid)">${sessionDates.length}</div><div class="month-stat-label">Sessions</div></div>
    <div class="month-stat"><div class="month-stat-val" style="color:var(--green2)">${avgPct!==null?avgPct+'%':'—'}</div><div class="month-stat-label">Avg Attendance</div></div>
    <div class="month-stat"><div class="month-stat-val" style="color:var(--white)">${SWIMMERS.length}</div><div class="month-stat-label">Swimmers</div></div>`;
  if (!sessionDates.length) { container.innerHTML = '<div class="empty-state">No sessions recorded this month</div>'; return; }
  const swimmerStats = SWIMMERS.map(sw => {
    let p=0,total=0;
    sessionDates.forEach(d => { const s=attendance[d]?.[sw.name]?.status; if(s==='present'||s==='absent'){total++;if(s==='present')p++;} });
    return { sw, p, total, pct: total>0?Math.round(p/total*100):null };
  }).sort((a,b) => (b.pct??-1)-(a.pct??-1));
  let html = '<div class="month-swimmer-table">';
  html += `<div class="month-swimmer-row msw-header"><div>Name</div><div>Present</div><div>Absent</div><div>Total</div><div>%</div></div>`;
  swimmerStats.forEach(({sw,p,total,pct}) => {
    const absent=total-p;
    const color=pct===null?'var(--grey)':pct>=80?'var(--green2)':pct>=60?'var(--gold)':'var(--red2)';
    html += `<div class="month-swimmer-row">
      <div><div style="font-size:.85rem;font-weight:500">${sw.name}</div><div style="font-family:'DM Mono',monospace;font-size:.55rem;color:var(--grey)">${sw.groupName||''}</div></div>
      <div style="font-size:.82rem;color:var(--green2)">${p}</div>
      <div style="font-size:.82rem;color:var(--red2)">${absent}</div>
      <div style="font-size:.82rem;color:var(--grey)">${total}</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:1rem;color:${color}">${pct!==null?pct+'%':'—'}</div>
    </div>`;
  });
  html += '</div>'; container.innerHTML = html;
}

// ── EXPORTS ──
function exportCSV() {
  const dates = Object.keys(attendance).sort();
  if (!dates.length) { alert('No data to export yet.'); return; }
  let csv = 'Name,Group,Age,Gen,' + dates.join(',') + '\n';
  SWIMMERS.forEach(sw => {
    const row = [sw.name, sw.groupName||'', sw.age||'', sw.gen||''];
    dates.forEach(d => { const s=attendance[d]?.[sw.name]?.status; row.push(s==='present'?'P':s==='absent'?'A':''); });
    csv += row.map(v=>`"${v}"`).join(',') + '\n';
  });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download = `ssf_attendance_${todayStr()}.csv`; a.click();
}

function exportMonthlyCSV() {
  const pad = n => String(n).padStart(2,'0');
  const monthPrefix = `${monthlyYear}-${pad(monthlyMonth+1)}`;
  const sessionDates = Object.keys(attendance).filter(d => d.startsWith(monthPrefix) && SWIMMERS.some(sw => attendance[d]?.[sw.name]?.status)).sort();
  if (!sessionDates.length) { alert('No session data for this month.'); return; }
  let csv = 'Name,Group,' + sessionDates.join(',') + ',Total Present,Total Sessions,%\n';
  SWIMMERS.forEach(sw => {
    const row = [sw.name, sw.groupName||''];
    let p=0,t=0;
    sessionDates.forEach(d => { const s=attendance[d]?.[sw.name]?.status; row.push(s==='present'?'P':s==='absent'?'A':''); if(s==='present'||s==='absent'){t++;if(s==='present')p++;} });
    row.push(p, t, t>0?Math.round(p/t*100)+'%':'—');
    csv += row.map(v=>`"${v}"`).join(',') + '\n';
  });
  const monthName = new Date(monthlyYear,monthlyMonth,1).toLocaleDateString('en-US',{month:'long',year:'numeric'}).replace(' ','_');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download = `ssf_attendance_${monthName}.csv`; a.click();
}

function exportSummary() {
  ensureDate(currentDate);
  const data = attendance[currentDate];
  const label = new Date(currentDate+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  let present=[],absent=[],notes=[];
  SWIMMERS.forEach(sw => {
    const rec = data[sw.name];
    if (rec?.status==='present') present.push(sw.name.split(' ')[0]);
    else if (rec?.status==='absent') absent.push(sw.name.split(' ')[0]);
    if (rec?.note) notes.push(`${sw.name.split(' ')[0]}: ${rec.note}`);
  });
  let text = `SSF Aquatics Attendance — ${label}\n`;
  text += `Present (${present.length}): ${present.join(', ')||'—'}\n`;
  text += `Absent (${absent.length}): ${absent.join(', ')||'—'}\n`;
  if (notes.length) text += `Notes:\n${notes.map(n=>'  '+n).join('\n')}`;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('export-summary-btn');
    const orig = btn.textContent; btn.textContent = '✓ Copied!';
    setTimeout(() => btn.textContent=orig, 2000);
  }).catch(() => prompt('Copy this:', text));
}

// ── BOOT ──
function boot() {
  // Roster click delegation
  document.getElementById('roster-content').addEventListener('click', e => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const name = btn.dataset.name, action = btn.dataset.action;
    if (action === 'present' || action === 'absent') setStatus(name, action);
    else if (action === 'note') toggleNote(name);
  });
  document.getElementById('roster-content').addEventListener('input', e => {
    const ta = e.target.closest('textarea[data-name]');
    if (ta) saveNote(ta.dataset.name, ta.value);
  });

  // View tabs
  document.querySelectorAll('.view-tab').forEach(t => {
    t.addEventListener('click', () => switchView(t.dataset.view));
  });

  // Mark all
  document.getElementById('mark-present-btn').addEventListener('click', () => markAll('present'));
  document.getElementById('mark-absent-btn').addEventListener('click', () => markAll('absent'));
  document.getElementById('mark-clear-btn').addEventListener('click', () => markAll('clear'));

  // Monthly nav
  document.getElementById('month-prev-btn').addEventListener('click', () => {
    monthlyMonth--; if(monthlyMonth<0){monthlyMonth=11;monthlyYear--;} renderMonthly();
  });
  document.getElementById('month-next-btn').addEventListener('click', () => {
    monthlyMonth++; if(monthlyMonth>11){monthlyMonth=0;monthlyYear++;} renderMonthly();
  });
  document.getElementById('export-monthly-csv-btn').addEventListener('click', exportMonthlyCSV);

  // Exports
  document.getElementById('export-csv-btn').addEventListener('click', exportCSV);
  document.getElementById('export-summary-btn').addEventListener('click', exportSummary);

  initApp();
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', boot);
} else { boot(); }
</script>
</body>
</html>
