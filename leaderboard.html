<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Leaderboard — SSF Aquatics</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:#0B1F3A; --deep:#071429; --mid:#2196F3; --light:#64B5F6;
    --gold:#F9A825; --white:#F0F6FF; --grey:#8BA3C0;
    --free:#2196F3; --back:#43A047; --breast:#FB8C00; --fly:#8E24AA; --im:#E53935;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--deep);color:var(--white);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;}
  body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(180deg,transparent 0px,transparent 58px,rgba(33,150,243,0.04) 58px,rgba(33,150,243,0.04) 60px);pointer-events:none;z-index:0;}
  .shimmer-bg{position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(21,101,192,0.18) 0%,transparent 70%),radial-gradient(ellipse 60% 40% at 80% 100%,rgba(249,168,37,0.07) 0%,transparent 60%);pointer-events:none;z-index:0;}
  .container{max-width:1100px;margin:0 auto;padding:0 2rem;position:relative;z-index:1;}

  nav{position:sticky;top:0;z-index:100;background:rgba(7,20,41,0.92);backdrop-filter:blur(12px);border-bottom:1px solid rgba(33,150,243,0.15);padding:1rem 2rem;display:flex;align-items:center;gap:1.5rem;}
  nav a{color:var(--grey);text-decoration:none;font-size:.85rem;letter-spacing:.04em;transition:color .2s;}
  nav a:hover{color:var(--white);}
  nav .brand{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:.08em;color:var(--white);margin-right:auto;}
  nav .nav-active{color:var(--gold);}

  .page-header{padding:3.5rem 0 2rem;border-bottom:1px solid rgba(33,150,243,0.1);margin-bottom:2rem;}
  .page-header h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.5rem,6vw,4rem);letter-spacing:.06em;line-height:1;}
  .page-header h1 span{color:var(--gold);}
  .page-header p{color:var(--grey);margin-top:.5rem;font-size:.9rem;}

  /* TIER LEGEND */
  .tier-legend{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:2.5rem;}
  .tier-chip{padding:.28rem .65rem;border-radius:4px;font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.08em;font-weight:500;}

  /* CONTROLS */
  .controls{display:flex;flex-wrap:wrap;gap:1rem;align-items:center;margin-bottom:1.5rem;}
  .filter-pills{display:flex;gap:.4rem;}
  .pill{padding:.35rem .85rem;border-radius:20px;border:1px solid rgba(33,150,243,0.25);background:transparent;color:var(--grey);font-family:inherit;font-size:.78rem;cursor:pointer;transition:all .2s;}
  .pill:hover{border-color:var(--mid);color:var(--white);}
  .pill.active{background:var(--mid);border-color:var(--mid);color:#fff;}

  /* EVENT FILTER */
  .event-filter{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:1.75rem;}
  .ev-btn{padding:.32rem .75rem;border-radius:6px;border:1px solid rgba(33,150,243,0.18);background:transparent;color:var(--grey);font-family:'DM Mono',monospace;font-size:.7rem;cursor:pointer;transition:all .2s;}
  .ev-btn:hover{border-color:rgba(255,255,255,0.3);color:var(--white);}
  .ev-btn.selected{color:#fff;}
  .ev-btn.free.selected{background:rgba(33,150,243,0.22);border-color:var(--free);}
  .ev-btn.back.selected{background:rgba(67,160,71,0.22);border-color:var(--back);}
  .ev-btn.breast.selected{background:rgba(251,140,0,0.22);border-color:var(--breast);}
  .ev-btn.fly.selected{background:rgba(142,36,170,0.22);border-color:var(--fly);}
  .ev-btn.im.selected{background:rgba(229,57,53,0.22);border-color:var(--im);}

  /* PODIUM */
  .podium{display:grid;grid-template-columns:1fr 1.15fr 1fr;gap:1rem;margin-bottom:2.5rem;align-items:end;}
  .podium-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:1.25rem 1rem;text-align:center;text-decoration:none;color:inherit;display:block;transition:border-color .2s;}
  .podium-card:hover{border-color:rgba(255,255,255,0.2);}
  .podium-card.first{border-color:rgba(255,215,0,0.3);background:rgba(255,215,0,0.04);}
  .podium-card.second{border-color:rgba(192,192,192,0.25);}
  .podium-card.third{border-color:rgba(205,127,50,0.25);}
  .podium-medal{font-size:2rem;margin-bottom:.4rem;}
  .podium-rank{font-family:'Bebas Neue',sans-serif;font-size:.9rem;letter-spacing:.1em;color:var(--grey);margin-bottom:.3rem;}
  .podium-name{font-weight:500;font-size:.95rem;margin-bottom:.2rem;}
  .podium-time{font-family:'DM Mono',monospace;font-size:1.3rem;font-weight:500;}
  .podium-tier{display:inline-block;font-family:'DM Mono',monospace;font-size:.6rem;padding:.18rem .5rem;border-radius:3px;margin-top:.4rem;}
  .podium-gender{font-size:.68rem;padding:.15rem .4rem;border-radius:3px;font-weight:500;margin-left:.3rem;}
  .gender-M{background:rgba(33,150,243,0.15);color:var(--light);}
  .gender-F{background:rgba(123,31,162,0.2);color:#CE93D8;}

  /* LEADERBOARD TABLE */
  .lb-table{width:100%;border-collapse:collapse;margin-bottom:4rem;}
  .lb-table th{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:var(--grey);padding:.55rem .9rem;text-align:left;border-bottom:1px solid rgba(33,150,243,0.15);}
  .lb-table td{padding:.7rem .9rem;border-bottom:1px solid rgba(255,255,255,0.04);font-size:.88rem;vertical-align:middle;}
  .lb-table tr:hover td{background:rgba(33,150,243,0.035);}
  .lb-rank{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;color:var(--grey);min-width:2.2rem;}
  .lb-rank.r1{color:#FFD700;} .lb-rank.r2{color:#C0C0C0;} .lb-rank.r3{color:#CD7F32;}
  .lb-name a{color:var(--white);text-decoration:none;}
  .lb-name a:hover{color:var(--light);}
  .lb-time{font-family:'DM Mono',monospace;font-size:.95rem;font-weight:500;}
  .lb-tier-badge{font-family:'DM Mono',monospace;font-size:.6rem;padding:.15rem .45rem;border-radius:3px;font-weight:500;}

  /* SECTION HEADERS */
  .section-label{font-family:'DM Mono',monospace;font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;color:var(--grey);margin-bottom:.75rem;display:flex;align-items:center;gap:.75rem;}
  .section-label::after{content:'';flex:1;height:1px;background:rgba(33,150,243,0.1);}

  .loading-state,.empty-state{text-align:center;padding:3rem 2rem;color:var(--grey);}
  .spinner{width:32px;height:32px;border:2px solid rgba(33,150,243,0.2);border-top-color:var(--mid);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 1rem;}
  @keyframes spin{to{transform:rotate(360deg);}}

  footer{border-top:1px solid rgba(33,150,243,0.1);padding:2rem;text-align:center;color:var(--grey);font-size:.8rem;position:relative;z-index:1;}

  @media(max-width:600px){.podium{grid-template-columns:1fr;}.podium-card.second,.podium-card.third{order:1;}}
</style>
</head>
<body>
<div class="shimmer-bg"></div>

<nav>
  <span class="brand">SSF Aquatics</span>
  <a href="index.html">Home</a>
  <a href="times.html">Times</a>
  <a href="leaderboard.html" class="nav-active">Leaderboard</a>
  <a href="dashboard.html">My Account</a>
</nav>

<div class="container">
  <div class="page-header">
    <h1>Team <span>Leaderboard</span></h1>
    <p>Top performers by event · USA Swimming motivational time standards · SCY</p>
  </div>

  <!-- Tier legend -->
  <div class="tier-legend" id="tier-legend"></div>

  <!-- Controls -->
  <div class="controls">
    <div class="filter-pills" id="gender-pills">
      <button class="pill active" data-gender="all">All</button>
      <button class="pill" data-gender="M">Boys</button>
      <button class="pill" data-gender="F">Girls</button>
    </div>
  </div>

  <!-- Event selector -->
  <div class="event-filter" id="event-filter"></div>

  <!-- Content -->
  <div id="lb-content">
    <div class="loading-state"><div class="spinner"></div><p>Loading leaderboard…</p></div>
  </div>
</div>

<footer>SSF Aquatics · South San Francisco · 2026</footer>

<script type="module">
import { initializeApp }  from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA-hATur1TXeZePf4W4lqDTsxNRIg0NKfs",
  authDomain: "ssfaquatics.firebaseapp.com",
  projectId: "ssfaquatics",
  storageBucket: "ssfaquatics.firebasestorage.app",
  messagingSenderId: "21079628309",
  appId: "1:21079628309:web:8958a334f5cd5a69ae4c1c"
};
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// ── USA Swimming SCY Motivational Standards (Mixed / unisex for simplicity) ──
// Times in seconds. Tiers: B, BB, A, AA, AAA, AAAA
const STANDARDS = {
  '50 Free':   { B:40,  BB:35,  A:30,  AA:27,  AAA:24.5, AAAA:22.9 },
  '100 Free':  { B:90,  BB:78,  A:67,  AA:59,  AAA:53,   AAAA:49.5 },
  '200 Free':  { B:200, BB:175, A:150, AA:132, AAA:118,  AAAA:110  },
  '500 Free':  { B:540, BB:475, A:410, AA:360, AAA:325,  AAAA:303  },
  '100 Back':  { B:100, BB:87,  A:75,  AA:67,  AAA:60,   AAAA:56   },
  '200 Back':  { B:215, BB:190, A:163, AA:145, AAA:130,  AAAA:121  },
  '100 Breast':{ B:110, BB:96,  A:83,  AA:74,  AAA:66,   AAAA:62   },
  '200 Breast':{ B:240, BB:212, A:183, AA:163, AAA:145,  AAAA:136  },
  '100 Fly':   { B:103, BB:90,  A:77,  AA:69,  AAA:62,   AAAA:57.5 },
  '200 Fly':   { B:225, BB:198, A:170, AA:152, AAA:136,  AAAA:126  },
  '200 IM':    { B:215, BB:190, A:163, AA:144, AAA:130,  AAAA:121  },
  '400 IM':    { B:465, BB:412, A:355, AA:315, AAA:283,  AAAA:263  },
};

const TIERS = [
  { key:'AAAA', label:'AAAA',  bg:'rgba(156,39,176,0.25)', color:'#CE93D8' },
  { key:'AAA',  label:'AAA',   bg:'rgba(233,30,99,0.2)',   color:'#F48FB1' },
  { key:'AA',   label:'AA',    bg:'rgba(0,188,212,0.18)',  color:'#80DEEA' },
  { key:'A',    label:'A',     bg:'rgba(255,215,0,0.18)',  color:'#FFD700' },
  { key:'BB',   label:'BB',    bg:'rgba(192,192,192,0.15)',color:'#C0C0C0' },
  { key:'B',    label:'B',     bg:'rgba(205,127,50,0.15)', color:'#CD7F32' },
];

function getTier(event, secs) {
  const std = STANDARDS[event];
  if (!std) return null;
  for (const t of TIERS) {
    if (secs <= std[t.key]) return t;
  }
  return null;
}

function tierBadge(tier) {
  if (!tier) return '';
  return `<span class="lb-tier-badge" style="background:${tier.bg};color:${tier.color}">${tier.label}</span>`;
}

// Helpers
function strokeOf(ev) {
  const e = ev.toUpperCase();
  if (e.includes('FREE'))   return 'free';
  if (e.includes('BACK'))   return 'back';
  if (e.includes('BREAST')) return 'breast';
  if (e.includes('FLY'))    return 'fly';
  if (e.includes('IM'))     return 'im';
  return 'free';
}
const EVENT_ORDER = ['50 Free','100 Free','200 Free','500 Free','1000 Free','1650 Free',
  '100 Back','200 Back','100 Breast','200 Breast','100 Fly','200 Fly','200 IM','400 IM'];

function parseSecs(t) {
  t = t.trim();
  if (t.includes(':')) { const [m,s] = t.split(':'); return parseInt(m)*60+parseFloat(s); }
  return parseFloat(t);
}

const strokeColors = { free:'var(--free)', back:'var(--back)', breast:'var(--breast)', fly:'var(--fly)', im:'var(--im)' };

// State
let allSwimmers = [];
let genderFilter = 'all';
let selectedEvent = null;

async function load() {
  const q = query(collection(db, 'swimmers'), where('active','==',true));
  const snap = await getDocs(q);
  allSwimmers = snap.docs.map(d => ({ id: d.id, ...d.data() }));

  buildTierLegend();
  buildEventFilter();
  render();
}

function buildTierLegend() {
  document.getElementById('tier-legend').innerHTML = TIERS.map(t =>
    `<span class="tier-chip" style="background:${t.bg};color:${t.color}">${t.label}</span>`
  ).join('') + `<span class="tier-chip" style="background:rgba(255,255,255,0.05);color:var(--grey)">No standard</span>`;
}

function buildEventFilter() {
  const eventSet = new Set();
  allSwimmers.forEach(s => Object.keys(s.times||{}).forEach(ev => eventSet.add(ev)));
  const events = [...eventSet].sort((a,b) => {
    const ai = EVENT_ORDER.indexOf(a), bi = EVENT_ORDER.indexOf(b);
    if (ai===-1&&bi===-1) return a.localeCompare(b);
    if (ai===-1) return 1; if (bi===-1) return -1;
    return ai - bi;
  });
  if (!selectedEvent && events.length) selectedEvent = events[0];
  const wrap = document.getElementById('event-filter');
  wrap.innerHTML = events.map(ev => {
    const s = strokeOf(ev);
    return `<button class="ev-btn ${s}${selectedEvent===ev?' selected':''}" data-ev="${ev}">${ev}</button>`;
  }).join('');
  wrap.querySelectorAll('.ev-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      selectedEvent = btn.dataset.ev;
      wrap.querySelectorAll('.ev-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      render();
    });
  });
}

function render() {
  const container = document.getElementById('lb-content');
  if (!selectedEvent) { container.innerHTML = `<div class="empty-state">No events found</div>`; return; }

  const stroke = strokeOf(selectedEvent);
  const color  = strokeColors[stroke];

  let rows = allSwimmers
    .filter(s => {
      if (genderFilter !== 'all' && s.gender !== genderFilter) return false;
      return s.times && s.times[selectedEvent];
    })
    .map(s => {
      const secs = parseSecs(s.times[selectedEvent]);
      const tier = getTier(selectedEvent, secs);
      return { ...s, secs, display: s.times[selectedEvent], tier };
    });

  rows.sort((a,b) => a.secs - b.secs);

  if (!rows.length) {
    container.innerHTML = `<div class="empty-state"><p>No times recorded for <strong>${selectedEvent}</strong> yet.</p></div>`;
    return;
  }

  // Podium (top 3)
  const podium3 = rows.slice(0, 3);
  const medals = ['🥇','🥈','🥉'];
  const podiumOrder = podium3.length >= 3 ? [podium3[1], podium3[0], podium3[2]] : podium3;
  const podiumClasses = podium3.length >= 3 ? ['second','first','third'] : ['first','second','third'];

  const podiumHtml = `
    <div class="section-label">Top Performers</div>
    <div class="podium" style="margin-bottom:2.5rem">
      ${podiumOrder.map((r, idx) => {
        const cls = podiumClasses[idx];
        const rank = cls === 'first' ? 1 : cls === 'second' ? 2 : 3;
        return `<a class="podium-card ${cls}" href="swimmer.html?id=${r.id}">
          <div class="podium-medal">${medals[rank-1]}</div>
          <div class="podium-rank">${cls.toUpperCase()}</div>
          <div class="podium-name">${r.name} <span class="podium-gender gender-${r.gender}">${r.gender}</span></div>
          <div class="podium-time" style="color:${color}">${r.display}</div>
          ${r.tier ? `<div class="podium-tier" style="background:${r.tier.bg};color:${r.tier.color}">${r.tier.label}</div>` : ''}
        </a>`;
      }).join('')}
    </div>`;

  // Full table
  const tableHtml = `
    <div class="section-label">Full Rankings · ${selectedEvent}</div>
    <table class="lb-table">
      <thead>
        <tr><th>#</th><th>Swimmer</th><th>Time</th><th>Tier</th></tr>
      </thead>
      <tbody>
        ${rows.map((r,i) => {
          const rc = i===0?'r1':i===1?'r2':i===2?'r3':'';
          return `<tr>
            <td><span class="lb-rank ${rc}">${i+1}</span></td>
            <td class="lb-name">
              <a href="swimmer.html?id=${r.id}">${r.name}</a>
              <span class="podium-gender gender-${r.gender}" style="margin-left:.4rem;font-size:.65rem;padding:.12rem .35rem;border-radius:3px;">${r.gender}</span>
            </td>
            <td><span class="lb-time" style="color:${color}">${r.display}</span></td>
            <td>${r.tier ? tierBadge(r.tier) : '<span style="color:var(--grey);font-size:.78rem">—</span>'}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>`;

  container.innerHTML = podiumHtml + tableHtml;
}

// Gender pills
document.querySelectorAll('#gender-pills .pill').forEach(p => {
  p.addEventListener('click', () => {
    document.querySelectorAll('#gender-pills .pill').forEach(x => x.classList.remove('active'));
    p.classList.add('active');
    genderFilter = p.dataset.gender;
    render();
  });
});

load().catch(e => {
  console.error(e);
  document.getElementById('lb-content').innerHTML = `<div class="empty-state"><p>Failed to load leaderboard.</p></div>`;
});
</script>
</body>
</html>
