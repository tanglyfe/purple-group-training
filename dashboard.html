<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dashboard — Purple Group</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:#0B1F3A; --deep:#071429; --mid:#2196F3; --light:#64B5F6;
    --white:#F0F6FF; --grey:#8BA3C0; --gold:#F9A825;
    --green2:#43A047; --red2:#EF5350;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;-webkit-text-size-adjust:100%;}
  body{background:var(--deep);color:var(--white);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;padding-bottom:4rem;}
  body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(180deg,transparent 0px,transparent 58px,rgba(33,150,243,0.03) 58px,rgba(33,150,243,0.03) 60px);pointer-events:none;z-index:0;}

  .topbar{position:sticky;top:0;z-index:100;background:rgba(7,20,41,0.97);backdrop-filter:blur(12px);border-bottom:1px solid rgba(33,150,243,0.15);padding:.75rem 1rem;}
  .topbar-inner{max-width:680px;margin:0 auto;display:flex;align-items:center;gap:.75rem;}
  .back-btn{display:flex;align-items:center;gap:.4rem;font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.14em;color:var(--grey);text-decoration:none;text-transform:uppercase;padding:.4rem .6rem;border:1px solid rgba(255,255,255,0.08);border-radius:2px;transition:color .2s,border-color .2s;flex-shrink:0;}
  .back-btn:hover{color:var(--light);border-color:rgba(33,150,243,0.3);}
  .topbar-title{flex:1;min-width:0;}
  .topbar-title h1{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:.04em;line-height:1;}
  .topbar-sub{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.12em;color:var(--grey);text-transform:uppercase;margin-top:.15rem;}
  .signout-btn{background:none;border:1px solid rgba(255,255,255,0.08);border-radius:2px;color:var(--grey);font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;padding:.3rem .6rem;cursor:pointer;transition:all .2s;flex-shrink:0;}
  .signout-btn:hover{border-color:rgba(198,40,40,.4);color:#EF9A9A;}

  .loading-wrap{min-height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.75rem;}
  .loading-text{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.18em;color:var(--grey);text-transform:uppercase;}
  .loading-sub{font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.12em;color:rgba(139,163,192,0.4);text-transform:uppercase;}

  .content{max-width:680px;margin:0 auto;padding:1.5rem 1rem;position:relative;z-index:1;}

  .welcome{margin-bottom:2rem;}
  .welcome-name{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:.03em;line-height:1;}
  .welcome-role{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.15em;color:var(--grey);text-transform:uppercase;margin-top:.3rem;}

  .role-badge{display:inline-flex;align-items:center;gap:.4rem;font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;padding:.3rem .65rem;border-radius:2px;margin-top:.5rem;}
  .role-badge.swimmer{background:rgba(33,150,243,0.12);border:1px solid rgba(33,150,243,0.25);color:var(--light);}
  .role-badge.parent{background:rgba(249,168,37,0.1);border:1px solid rgba(249,168,37,0.25);color:var(--gold);}
  .role-badge.coach{background:rgba(46,125,50,0.12);border:1px solid rgba(46,125,50,0.25);color:var(--green2);}

  .section-hdr{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.18em;color:var(--grey);text-transform:uppercase;margin-bottom:.75rem;margin-top:1.75rem;}

  .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:1px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;}
  .dash-card{background:var(--deep);padding:1.1rem 1rem;text-decoration:none;transition:background .15s;display:block;position:relative;}
  .dash-card:hover{background:rgba(33,150,243,0.06);}
  .dash-card::after{content:'→';position:absolute;bottom:.8rem;right:.9rem;font-size:.8rem;color:rgba(139,163,192,0.3);transition:color .15s;}
  .dash-card:hover::after{color:var(--mid);}
  .card-icon{font-size:1.5rem;margin-bottom:.5rem;}
  .card-title{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.12em;color:var(--light);text-transform:uppercase;margin-bottom:.25rem;}
  .card-desc{font-size:.75rem;color:var(--grey);line-height:1.5;}

  .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;margin-bottom:1.5rem;}
  .stat-box{background:var(--deep);padding:.9rem 1rem;}
  .stat-label{font-family:'DM Mono',monospace;font-size:.57rem;letter-spacing:.14em;color:var(--grey);text-transform:uppercase;margin-bottom:.25rem;}
  .stat-num{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;line-height:1;}
  .stat-sub{font-family:'DM Mono',monospace;font-size:.55rem;color:var(--grey);margin-top:.15rem;}

  .roster-section{border:1px solid rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;}
  .roster-row{display:grid;grid-template-columns:1fr auto auto;gap:.75rem;align-items:center;padding:.65rem .9rem;border-bottom:1px solid rgba(255,255,255,0.04);}
  .roster-row:last-child{border-bottom:none;}
  .roster-row.header{background:rgba(255,255,255,0.03);font-family:'DM Mono',monospace;font-size:.57rem;letter-spacing:.12em;color:var(--grey);text-transform:uppercase;}
  .roster-name{font-size:.88rem;font-weight:500;}
  .roster-meta{font-family:'DM Mono',monospace;font-size:.55rem;color:var(--grey);text-transform:uppercase;margin-top:.1rem;}
  .remove-btn{background:none;border:1px solid rgba(198,40,40,0.2);border-radius:2px;color:rgba(239,83,80,0.6);font-family:'DM Mono',monospace;font-size:.55rem;letter-spacing:.08em;text-transform:uppercase;padding:.2rem .5rem;cursor:pointer;transition:all .15s;}
  .remove-btn:hover{border-color:var(--red2);color:var(--red2);}
  .empty-state{padding:2rem;text-align:center;font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.14em;color:rgba(139,163,192,0.35);text-transform:uppercase;}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <a class="back-btn" href="index.html">← Home</a>
    <div class="topbar-title">
      <h1>Dashboard</h1>
      <div class="topbar-sub" id="topbar-sub">Purple Group</div>
    </div>
    <button class="signout-btn" id="signout-btn">Sign Out</button>
  </div>
</div>

<div class="loading-wrap" id="loading-wrap">
  <div class="loading-text">Loading your dashboard…</div>
  <div class="loading-sub" id="loading-sub"></div>
</div>

<div class="content" id="dash-content" style="display:none;"></div>

<script type="module">
import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
import {
  getAuth, onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
import {
  getFirestore, doc, getDoc, getDocs, collection, deleteDoc
} from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA-hATur1TXeZePf4W4lqDTsxNRIg0NKfs",
  authDomain: "ssfaquatics.firebaseapp.com",
  projectId: "ssfaquatics",
  storageBucket: "ssfaquatics.firebasestorage.app",
  messagingSenderId: "21079628309",
  appId: "1:21079628309:web:8958a334f5cd5a69ae4c1c"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

document.getElementById('signout-btn').addEventListener('click', async () => {
  await signOut(auth);
  window.location.href = 'login.html';
});

// Retry fetching user doc up to 5× with 600ms gaps
// Fixes race condition where Firestore write hasn't completed before redirect
async function getUserDoc(uid) {
  for (let i = 0; i < 5; i++) {
    const snap = await getDoc(doc(db, 'users', uid));
    if (snap.exists()) return snap;
    document.getElementById('loading-sub').textContent = 'Setting up your account…';
    await new Promise(r => setTimeout(r, 600));
  }
  return null;
}

onAuthStateChanged(auth, async user => {
  if (!user) {
    window.location.href = 'login.html';
    return;
  }

  const snap = await getUserDoc(user.uid);

  if (!snap) {
    // Doc never appeared after retries — registration may have failed
    await signOut(auth);
    window.location.href = 'register.html';
    return;
  }

  renderDashboard(user, snap.data());
});

async function renderDashboard(user, profile) {
  document.getElementById('loading-wrap').style.display = 'none';
  const content = document.getElementById('dash-content');
  content.style.display = 'block';

  const firstName = (profile.displayName || user.displayName || 'Swimmer').split(' ')[0];
  document.getElementById('topbar-sub').textContent =
    profile.role.charAt(0).toUpperCase() + profile.role.slice(1) + ' · Purple Group';

  const roleEmoji = { swimmer:'🏊', parent:'👨‍👩‍👧', coach:'⭐' };
  const roleLabel = { swimmer:'Swimmer Account', parent:'Parent Account', coach:'Coach Account' };

  let html = `
    <div class="welcome">
      <div class="welcome-name">Hey, ${firstName}</div>
      <div class="welcome-role">Welcome back to Purple Group</div>
      <div class="role-badge ${profile.role}">${roleEmoji[profile.role] || '👤'} ${roleLabel[profile.role] || profile.role}</div>
    </div>`;

  if (profile.role === 'swimmer')     html += renderSwimmerDash();
  else if (profile.role === 'parent') html += renderParentDash(profile);
  else if (profile.role === 'coach')  html += await renderCoachDash();

  content.innerHTML = html;

  if (profile.role === 'coach') {
    content.querySelectorAll('.remove-btn[data-uid]').forEach(btn => {
      btn.addEventListener('click', async () => {
        if (!confirm(`Remove ${btn.dataset.name} from the team?`)) return;
        await deleteDoc(doc(db, 'users', btn.dataset.uid));
        btn.closest('.roster-row').remove();
      });
    });
  }
}

function renderSwimmerDash() {
  return `
    <div class="section-hdr">My Tools</div>
    <div class="card-grid">
      <a class="dash-card" href="times.html">
        <div class="card-icon">🏆</div>
        <div class="card-title">Times</div>
        <div class="card-desc">Personal bests · USA Swimming cuts · tier progress</div>
      </a>
      <a class="dash-card" href="attendance.html">
        <div class="card-icon">✅</div>
        <div class="card-title">Attendance</div>
        <div class="card-desc">My session history · streaks · monthly view</div>
      </a>
      <a class="dash-card" href="dryland.html">
        <div class="card-icon">💪</div>
        <div class="card-title">Dryland Log</div>
        <div class="card-desc">Log sets · track weekly progress</div>
      </a>
    </div>
    <div class="section-hdr">Team</div>
    <div class="card-grid">
      <a class="dash-card" href="leaderboard.html">
        <div class="card-icon">📋</div>
        <div class="card-title">Leaderboard</div>
        <div class="card-desc">Team rankings · time drops · next cut</div>
      </a>
      <a class="dash-card" href="index.html">
        <div class="card-icon">📅</div>
        <div class="card-title">Workouts</div>
        <div class="card-desc">Weekly schedule · pace tables</div>
      </a>
    </div>`;
}

function renderParentDash(profile) {
  const childName = profile.childName || 'your swimmer';
  return `
    <div class="section-hdr">Tracking ${childName}</div>
    <div class="card-grid">
      <a class="dash-card" href="times.html">
        <div class="card-icon">🏆</div>
        <div class="card-title">Times</div>
        <div class="card-desc">Personal bests · USA Swimming cuts</div>
      </a>
      <a class="dash-card" href="attendance.html">
        <div class="card-icon">✅</div>
        <div class="card-title">Attendance</div>
        <div class="card-desc">Session history · monthly trends</div>
      </a>
      <a class="dash-card" href="dryland.html">
        <div class="card-icon">💪</div>
        <div class="card-title">Dryland</div>
        <div class="card-desc">Weekly dryland progress</div>
      </a>
    </div>
    <div class="section-hdr">Team</div>
    <div class="card-grid">
      <a class="dash-card" href="leaderboard.html">
        <div class="card-icon">📋</div>
        <div class="card-title">Leaderboard</div>
        <div class="card-desc">Team rankings by event</div>
      </a>
      <a class="dash-card" href="index.html">
        <div class="card-icon">📅</div>
        <div class="card-title">Workouts</div>
        <div class="card-desc">Weekly training schedule</div>
      </a>
    </div>`;
}

async function renderCoachDash() {
  const snap = await getDocs(collection(db, 'users'));
  const users = [];
  snap.forEach(d => users.push({ uid: d.id, ...d.data() }));

  const swimmers = users.filter(u => u.role === 'swimmer');
  const parents  = users.filter(u => u.role === 'parent');
  const coaches  = users.filter(u => u.role === 'coach');

  let html = `
    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-label">Swimmers</div>
        <div class="stat-num" style="color:var(--mid)">${swimmers.length}</div>
        <div class="stat-sub">registered</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Parents</div>
        <div class="stat-num" style="color:var(--gold)">${parents.length}</div>
        <div class="stat-sub">registered</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Coaches</div>
        <div class="stat-num" style="color:var(--green2)">${coaches.length}</div>
        <div class="stat-sub">registered</div>
      </div>
    </div>
    <div class="section-hdr">Coach Tools</div>
    <div class="card-grid">
      <a class="dash-card" href="attendance.html">
        <div class="card-icon">✅</div>
        <div class="card-title">Attendance</div>
        <div class="card-desc">Mark sessions · monthly view · alerts</div>
      </a>
      <a class="dash-card" href="rankings-coach.html">
        <div class="card-icon">⭐</div>
        <div class="card-title">Times Entry</div>
        <div class="card-desc">Enter meet results · manage PBs</div>
      </a>
      <a class="dash-card" href="coach-hub.html">
        <div class="card-icon">📁</div>
        <div class="card-title">Coach Hub</div>
        <div class="card-desc">Downloads · roster intel · dashboard</div>
      </a>
      <a class="dash-card" href="leaderboard.html">
        <div class="card-icon">📋</div>
        <div class="card-title">Leaderboard</div>
        <div class="card-desc">Team rankings by event</div>
      </a>
    </div>
    <div class="section-hdr">Registered Members</div>
    <div class="roster-section">
      <div class="roster-row header">
        <div>Member</div><div>Role</div><div>Action</div>
      </div>`;

  const all = [...coaches, ...swimmers, ...parents];
  if (all.length === 0) {
    html += `<div class="empty-state">No registered members yet</div>`;
  } else {
    all.forEach(u => {
      const roleColor = u.role === 'coach' ? 'var(--green2)' : u.role === 'parent' ? 'var(--gold)' : 'var(--light)';
      const meta = u.role === 'parent' && u.childName ? `Parent of ${u.childName}` : u.email || '';
      html += `<div class="roster-row">
        <div>
          <div class="roster-name">${u.displayName || u.email}</div>
          <div class="roster-meta">${meta}</div>
        </div>
        <div style="font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:${roleColor}">${u.role}</div>
        <button class="remove-btn" data-uid="${u.uid}" data-name="${u.displayName || u.email}">Remove</button>
      </div>`;
    });
  }

  html += `</div>`;
  return html;
}
</script>
</body>
</html>
